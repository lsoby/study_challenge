<title>StudySync</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0d0f14;
  --bg2: #141720;
  --bg3: #1c2030;
  --bg4: #232840;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.14);
  --text: #e8eaf0;
  --text2: #8b90a8;
  --text3: #555d7a;
  --accent: #6c8fff;
  --accent2: #4d6fd4;
  --green: #3ecf8e;
  --green2: #2aaf74;
  --amber: #f5a623;
  --red: #ef4444;
  --purple: #a78bfa;
  --font: 'Sora', sans-serif;
  --mono: 'Space Mono', monospace;
  --radius: 12px;
  --radius-lg: 18px;
}

html, body { height: 100%; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.6;
  min-height: 100vh;
}

/* ── LAYOUT ── */
.app { display: flex; flex-direction: column; min-height: 100vh; }
.content { flex: 1; overflow-y: auto; padding: 24px 20px; max-width: 860px; margin: 0 auto; width: 100%; }
.content::-webkit-scrollbar { width: 4px; }
.content::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

/* ── AUTH ── */
.auth-screen {
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh; flex-direction: column; gap: 0;
  background: linear-gradient(135deg, #0d0f14 0%, #141028 50%, #0d0f14 100%);
}
.auth-logo {
  font-family: var(--mono); font-size: 28px; font-weight: 700;
  letter-spacing: -1px; margin-bottom: 6px;
  background: linear-gradient(90deg, #6c8fff, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.auth-tagline { color: var(--text2); font-size: 13px; margin-bottom: 36px; }
.auth-card {
  background: var(--bg2); border: 0.5px solid var(--border2);
  border-radius: var(--radius-lg); padding: 32px; width: 340px;
}
.auth-tabs { display: flex; gap: 4px; margin-bottom: 28px; background: var(--bg); border-radius: 8px; padding: 4px; }
.auth-tab {
  flex: 1; padding: 8px; text-align: center; border-radius: 6px; cursor: pointer;
  font-size: 13px; font-weight: 500; color: var(--text2); transition: all 0.2s;
}
.auth-tab.active { background: var(--bg4); color: var(--text); }

/* ── FORM FIELDS ── */
.field-label { font-size: 12px; color: var(--text2); margin-bottom: 6px; font-weight: 500; letter-spacing: 0.3px; }
.field-group { margin-bottom: 16px; }
.field-input {
  width: 100%; background: var(--bg3); border: 0.5px solid var(--border2);
  border-radius: 8px; padding: 10px 12px; color: var(--text); font-family: var(--font);
  font-size: 13px; outline: none; transition: border-color 0.2s;
}
.field-input:focus { border-color: var(--accent); }
.field-input::placeholder { color: var(--text3); }
select.field-input { cursor: pointer; }
select.field-input option { background: var(--bg3); }
.btn-primary {
  width: 100%; padding: 12px; background: var(--accent); border: none;
  border-radius: 8px; color: white; font-family: var(--font); font-size: 14px;
  font-weight: 600; cursor: pointer; transition: all 0.2s; margin-top: 8px;
}
.btn-primary:hover { background: var(--accent2); }
.auth-err { color: var(--red); font-size: 12px; margin-top: 10px; text-align: center; min-height: 18px; }

/* ── NAV ── */
.nav {
  display: flex; align-items: center; padding: 0 20px; height: 52px;
  border-bottom: 0.5px solid var(--border); background: var(--bg2); flex-shrink: 0;
  position: sticky; top: 0; z-index: 50;
}
.nav-logo { font-family: var(--mono); font-size: 16px; font-weight: 700; letter-spacing: -0.5px;
  background: linear-gradient(90deg, #6c8fff, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.nav-tabs { display: flex; gap: 2px; margin-left: 28px; flex: 1; }
.nav-tab {
  padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px;
  font-weight: 500; color: var(--text2); transition: all 0.2s;
}
.nav-tab.active { background: var(--bg4); color: var(--text); }
.nav-tab:hover:not(.active) { color: var(--text); }
.nav-user { display: flex; align-items: center; gap: 10px; margin-left: auto; }
.nav-avatar {
  width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center;
  justify-content: center; font-size: 12px; font-weight: 600;
  background: linear-gradient(135deg, var(--accent), var(--purple)); flex-shrink: 0;
}
.nav-name { font-size: 13px; font-weight: 500; }
.btn-logout {
  padding: 4px 10px; background: transparent; border: 0.5px solid var(--border2);
  border-radius: 6px; color: var(--text2); cursor: pointer; font-size: 12px;
  font-family: var(--font); transition: all 0.2s;
}
.btn-logout:hover { border-color: var(--red); color: var(--red); }

/* ── REALTIME INDICATOR ── */
.sync-dot {
  width: 7px; height: 7px; border-radius: 50%; background: var(--text3);
  transition: background 0.4s; flex-shrink: 0;
}
.sync-dot.live { background: var(--green); box-shadow: 0 0 6px var(--green); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }

/* ── DASHBOARD ── */
.section-title { font-size: 11px; font-weight: 600; letter-spacing: 1.2px; text-transform: uppercase; color: var(--text3); margin-bottom: 14px; }

.stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 24px; }
.stat-card {
  background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius);
  padding: 16px;
}
.stat-val { font-family: var(--mono); font-size: 26px; font-weight: 700; line-height: 1; margin-bottom: 4px; }
.stat-lbl { font-size: 11px; color: var(--text2); font-weight: 500; }
.stat-sub { font-size: 10px; color: var(--text3); margin-top: 2px; }

.goal-bar-wrap { margin-bottom: 24px; }
.goal-bar-bg { height: 8px; background: var(--bg3); border-radius: 4px; overflow: hidden; margin: 10px 0 6px; }
.goal-bar-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease; }
.goal-info { display: flex; justify-content: space-between; font-size: 12px; color: var(--text2); }

.timer-card {
  background: var(--bg2); border: 0.5px solid var(--border2);
  border-radius: var(--radius-lg); padding: 20px; margin-bottom: 24px;
  display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px;
}
.timer-display { font-family: var(--mono); font-size: 36px; font-weight: 700; letter-spacing: 2px; }
.timer-status { font-size: 12px; color: var(--text2); margin-top: 4px; }
.timer-btns { display: flex; gap: 8px; }
.btn-timer {
  padding: 10px 20px; border-radius: 8px; cursor: pointer; font-family: var(--font);
  font-size: 13px; font-weight: 600; border: none; transition: all 0.2s;
}
.btn-start { background: var(--green); color: #0a1f14; }
.btn-start:hover { background: var(--green2); }
.btn-stop { background: var(--bg3); border: 0.5px solid var(--border2); color: var(--text); }
.btn-stop:hover { background: var(--red); border-color: var(--red); }

.session-log-wrap { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 16px; }
.session-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 0; border-bottom: 0.5px solid var(--border);
}
.session-item:last-child { border-bottom: none; }
.session-lbl { font-size: 13px; }
.session-time { font-family: var(--mono); font-size: 12px; color: var(--green); }
.session-date { font-size: 11px; color: var(--text3); }

/* ── ROOMS ── */
.rooms-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 20px; }
@media (max-width: 480px) { .rooms-grid { grid-template-columns: 1fr; } }
.room-card {
  background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius-lg);
  padding: 18px; cursor: pointer; transition: all 0.2s; position: relative;
}
.room-card:hover { border-color: var(--accent); background: var(--bg3); }
.room-card.mine { border-color: rgba(108,143,255,0.35); }
.room-name { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
.room-meta { font-size: 12px; color: var(--text2); }
.room-members { display: flex; margin-top: 12px; }
.mini-avatar {
  width: 24px; height: 24px; border-radius: 50%; font-size: 10px; font-weight: 600;
  display: flex; align-items: center; justify-content: center;
  border: 1.5px solid var(--bg2); margin-left: -6px;
}
.mini-avatar:first-child { margin-left: 0; }
.room-badge {
  position: absolute; top: 12px; right: 12px; font-size: 10px; font-weight: 600;
  padding: 3px 8px; border-radius: 4px; letter-spacing: 0.5px;
}
.badge-owner { background: rgba(108,143,255,0.18); color: var(--accent); }
.badge-member { background: rgba(62,207,142,0.14); color: var(--green); }

.btn-create-room {
  width: 100%; padding: 14px; background: var(--bg2); border: 0.5px dashed var(--border2);
  border-radius: var(--radius-lg); color: var(--text2); cursor: pointer; font-family: var(--font);
  font-size: 13px; font-weight: 500; transition: all 0.2s; display: flex; align-items: center;
  justify-content: center; gap: 8px;
}
.btn-create-room:hover { border-color: var(--accent); color: var(--accent); }

/* ── ROOM DETAIL ── */
.room-detail {
  background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius-lg);
  padding: 20px;
}
.room-detail-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 20px; }
.room-detail-title { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
.btn-back {
  background: var(--bg3); border: 0.5px solid var(--border2); border-radius: 6px;
  padding: 6px 12px; color: var(--text2); cursor: pointer; font-family: var(--font); font-size: 12px;
}
.btn-back:hover { color: var(--text); }

.member-row {
  display: flex; align-items: center; gap: 12px; padding: 12px 0;
  border-bottom: 0.5px solid var(--border);
}
.member-row:last-child { border-bottom: none; }
.member-avatar {
  width: 36px; height: 36px; border-radius: 50%; font-size: 13px; font-weight: 600;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.member-info { flex: 1; min-width: 0; }
.member-name { font-size: 13px; font-weight: 500; }
.member-goal-lbl { font-size: 11px; color: var(--text2); }
.member-progress { text-align: right; flex-shrink: 0; }
.member-hrs { font-family: var(--mono); font-size: 15px; font-weight: 700; }
.member-pct { font-size: 11px; color: var(--text2); }
.member-bar-bg { height: 4px; background: var(--bg3); border-radius: 2px; margin-top: 8px; width: 100%; }
.member-bar { height: 100%; border-radius: 2px; transition: width 0.6s; }

.invite-section { margin-top: 20px; padding-top: 16px; border-top: 0.5px solid var(--border); }
.invite-row { display: flex; gap: 8px; }
.invite-input {
  flex: 1; background: var(--bg3); border: 0.5px solid var(--border2);
  border-radius: 8px; padding: 9px 12px; color: var(--text); font-family: var(--font);
  font-size: 13px; outline: none;
}
.invite-input:focus { border-color: var(--accent); }
.btn-invite {
  padding: 9px 16px; background: var(--accent); border: none; border-radius: 8px;
  color: white; font-family: var(--font); font-size: 13px; font-weight: 600; cursor: pointer;
}
.btn-invite:hover { background: var(--accent2); }

/* ── SETTINGS ── */
.settings-card {
  background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius-lg);
  padding: 24px; margin-bottom: 16px;
}
.settings-title { font-size: 16px; font-weight: 600; margin-bottom: 20px; }
.goal-picker { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 16px; }
.goal-opt {
  padding: 12px 8px; background: var(--bg3); border: 0.5px solid var(--border);
  border-radius: 8px; text-align: center; cursor: pointer; transition: all 0.2s;
}
.goal-opt.selected { background: rgba(108,143,255,0.15); border-color: var(--accent); color: var(--accent); }
.goal-opt-val { font-family: var(--mono); font-size: 18px; font-weight: 700; }
.goal-opt-lbl { font-size: 10px; color: var(--text3); margin-top: 2px; }
.goal-opt.selected .goal-opt-lbl { color: var(--accent); opacity: 0.7; }
.custom-goal-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.custom-goal-input {
  width: 80px; background: var(--bg3); border: 0.5px solid var(--border2);
  border-radius: 8px; padding: 9px 12px; color: var(--text); font-family: var(--mono);
  font-size: 18px; font-weight: 700; outline: none; text-align: center;
}
.custom-goal-input:focus { border-color: var(--accent); }
.btn-save {
  padding: 10px 20px; background: var(--green); border: none; border-radius: 8px;
  color: #0a1f14; font-family: var(--font); font-size: 13px; font-weight: 700; cursor: pointer;
}
.btn-save:hover { background: var(--green2); }

.reset-day-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin-bottom: 12px; }
.reset-day-opt {
  padding: 10px 4px; background: var(--bg3); border: 0.5px solid var(--border);
  border-radius: 8px; text-align: center; cursor: pointer; transition: all 0.2s; font-size: 11px; font-weight: 600;
}
.reset-day-opt.selected { background: rgba(167,139,250,0.15); border-color: var(--purple); color: var(--purple); }

.week-chart { display: flex; align-items: flex-end; gap: 6px; height: 80px; margin-top: 16px; }
.day-bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
.day-bar-bg { width: 100%; background: var(--bg3); border-radius: 3px; flex: 1; display: flex; align-items: flex-end; }
.day-bar { width: 100%; border-radius: 3px; transition: height 0.4s; }
.day-lbl { font-size: 10px; color: var(--text3); font-family: var(--mono); }

.msg { font-size: 12px; color: var(--green); margin-top: 8px; min-height: 18px; }
.empty { text-align: center; color: var(--text3); font-size: 13px; padding: 30px; }
.week-reset-note { font-size: 11px; color: var(--text3); margin-top: 6px; }

/* ── MODAL ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.7);
  display: flex; align-items: center; justify-content: center; z-index: 100;
}
.modal {
  background: var(--bg2); border: 0.5px solid var(--border2);
  border-radius: var(--radius-lg); padding: 28px; width: 320px; max-width: 90vw;
}
.modal-title { font-size: 16px; font-weight: 700; margin-bottom: 20px; }
.modal-btns { display: flex; gap: 8px; margin-top: 20px; }
.btn-cancel {
  flex: 1; padding: 10px; background: var(--bg3); border: 0.5px solid var(--border2);
  border-radius: 8px; color: var(--text2); cursor: pointer; font-family: var(--font); font-size: 13px;
}
.btn-confirm {
  flex: 1; padding: 10px; background: var(--accent); border: none;
  border-radius: 8px; color: white; cursor: pointer; font-family: var(--font);
  font-size: 13px; font-weight: 600;
}

/* ── NOTIFICATION ── */
.notif {
  position: fixed; bottom: 20px; right: 20px; background: var(--bg3);
  border: 0.5px solid var(--green); border-radius: 8px; padding: 10px 16px;
  font-size: 13px; color: var(--green); z-index: 200; animation: slideIn 0.3s ease;
  max-width: 280px;
}
.notif.err { border-color: var(--red); color: var(--red); }
@keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

/* ── PILLS ── */
.pill {
  display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px;
  font-weight: 600; margin-left: 6px;
}
.pill-green { background: rgba(62,207,142,0.15); color: var(--green); }
.pill-amber { background: rgba(245,166,35,0.15); color: var(--amber); }
.pill-red { background: rgba(239,68,68,0.15); color: var(--red); }

/* ── LOADING ── */
.loading-overlay {
  position: fixed; inset: 0; background: var(--bg); display: flex;
  align-items: center; justify-content: center; z-index: 999; flex-direction: column; gap: 16px;
}
.loading-logo { font-family: var(--mono); font-size: 24px; font-weight: 700;
  background: linear-gradient(90deg, #6c8fff, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.loading-spinner {
  width: 28px; height: 28px; border: 2px solid var(--border2); border-top-color: var(--accent);
  border-radius: 50%; animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── LIVE BADGE ── */
.live-badge {
  display: inline-flex; align-items: center; gap: 5px; font-size: 10px;
  background: rgba(62,207,142,0.1); color: var(--green); padding: 3px 8px;
  border-radius: 20px; border: 0.5px solid rgba(62,207,142,0.3); margin-left: 8px;
}
.live-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--green); animation: pulse 1.5s infinite; }

/* ── DELETE ROOM ── */
.btn-danger {
  padding: 8px 16px; background: transparent; border: 0.5px solid rgba(239,68,68,0.4);
  border-radius: 8px; color: var(--red); cursor: pointer; font-family: var(--font); font-size: 12px;
  transition: all 0.2s; margin-top: 8px;
}
.btn-danger:hover { background: rgba(239,68,68,0.1); }

@media (max-width: 520px) {
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
  .nav-name { display: none; }
  .goal-picker { grid-template-columns: repeat(2, 1fr); }
  .reset-day-grid { grid-template-columns: repeat(4, 1fr); }
}
</style>
</head>

</div>

const COLORS = [
  'linear-gradient(135deg,#6c8fff,#a78bfa)',
  'linear-gradient(135deg,#3ecf8e,#2a8fff)',
  'linear-gradient(135deg,#f5a623,#ef4444)',
  'linear-gradient(135deg,#a78bfa,#f06)',
  'linear-gradient(135deg,#3ecf8e,#a78bfa)',
  'linear-gradient(135deg,#6c8fff,#3ecf8e)'
];
const DAYS_SHORT = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const DAYS_FULL  = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

function getColor(name) { let h=0; for(let c of (name||'')) h=(h*31+c.charCodeAt(0))%COLORS.length; return COLORS[h]; }
function getInitials(name) { return (name||'?').slice(0,2).toUpperCase(); }
function fmtHrs(h) { if(h<1) return Math.round(h*60)+'m'; return h.toFixed(1)+'h'; }
function fmtTimer(s) {
  const h=Math.floor(s/3600), m=Math.floor((s%3600)/60), sec=s%60;
  if(h>0) return [h,m,sec].map(x=>String(x).padStart(2,'0')).join(':');
  return [m,sec].map(x=>String(x).padStart(2,'0')).join(':');
}

const LS = {
  get: (k) => { try { return JSON.parse(localStorage.getItem('ss_'+k)); } catch(e) { return null; } },
  set: (k,v) => { try { localStorage.setItem('ss_'+k, JSON.stringify(v)); } catch(e) {} }
};

// ─────────────────────────────────────────────────────────────
// APP STATE
// ─────────────────────────────────────────────────────────────
let state = {
  user: null,          // logged-in username
  tab: 'dashboard',
  roomView: null,
  showCreateRoom: false,
  timer: { running: false, elapsed: 0, interval: null, label: '' },
  msg: '',
  msgType: 'ok',
  // realtime cache
  users: {},
  rooms: {},
  sessions: {},
  syncListeners: [],
  syncConnected: false,
};

// ─────────────────────────────────────────────────────────────
// WEEK KEY — respects customizable reset day
// ─────────────────────────────────────────────────────────────
function getResetDay() {
  const u = state.users[state.user];
  return (u && u.resetDay !== undefined) ? u.resetDay : 1; // default Monday
}

function weekKey(resetDay = null) {
  if (resetDay === null) resetDay = getResetDay();
  const now = new Date();
  // Find last reset day
  const dow = now.getDay(); // 0=Sun
  const diff = (dow - resetDay + 7) % 7;
  const weekStart = new Date(now);
  weekStart.setDate(now.getDate() - diff);
  weekStart.setHours(0,0,0,0);
  return weekStart.toISOString().slice(0,10);
}

function dayKey() { return new Date().toISOString().slice(0,10); }

// ─────────────────────────────────────────────────────────────
// DATA ACCESS
// ─────────────────────────────────────────────────────────────
async function fbGet(path) {
  if (!firebaseReady) return null;
  try {
    const snap = await get(ref(db, path));
    return snap.exists() ? snap.val() : null;
  } catch(e) { return null; }
}

async function fbSet(path, val) {
  if (!firebaseReady) return false;
  try { await set(ref(db, path), val); return true; } catch(e) { return false; }
}

async function fbUpdate(path, val) {
  if (!firebaseReady) return false;
  try { await update(ref(db, path), val); return true; } catch(e) { return false; }
}

async function fbRemove(path) {
  if (!firebaseReady) return false;
  try { await remove(ref(db, path)); return true; } catch(e) { return false; }
}

function fbListen(path, cb) {
  if (!firebaseReady) return () => {};
  const r = ref(db, path);
  const unsub = onValue(r, snap => cb(snap.exists() ? snap.val() : null));
  state.syncListeners.push(unsub);
  return unsub;
}

function stopAllListeners() {
  state.syncListeners.forEach(u => { try { u(); } catch(e) {} });
  state.syncListeners = [];
}

// ─────────────────────────────────────────────────────────────
// REAL-TIME SUBSCRIPTIONS
// ─────────────────────────────────────────────────────────────
function startSync() {
  stopAllListeners();

  // Connection state
  if (firebaseReady) {
    fbListen('.info/connected', connected => {
      state.syncConnected = !!connected;
      const dot = document.querySelector('.sync-dot');
      if (dot) dot.className = 'sync-dot' + (connected ? ' live' : '');
    });
  }

  // Users
  fbListen('users', data => {
    if (data) { state.users = data; }
    else {
      // Fallback to localStorage
      state.users = LS.get('users') || {};
    }
    refreshView();
  });

  // Rooms
  fbListen('rooms', data => {
    state.rooms = data || {};
    refreshView();
  });

  // Sessions
  fbListen('sessions', data => {
    state.sessions = data || {};
    refreshView();
  });
}

function refreshView() {
  if (!state.user) return;
  // Soft re-render — don't interrupt running timer
  renderMain();
}

// ─────────────────────────────────────────────────────────────
// SESSION HOURS
// ─────────────────────────────────────────────────────────────
function getUserWeekHours(username, resetDay = null) {
  if (resetDay === null) {
    const u = state.users[username];
    resetDay = (u && u.resetDay !== undefined) ? u.resetDay : 1;
  }
  const wk = weekKey(resetDay);
  const userSessions = state.sessions[username];
  if (!userSessions) return 0;
  let total = 0;
  Object.values(userSessions).forEach(s => {
    if (s.week === wk) total += s.duration;
  });
  return Math.round(total * 10) / 10;
}

function getUserDayHours(username, dayOffset) {
  const d = new Date(); d.setDate(d.getDate() - dayOffset);
  const dk = d.toISOString().slice(0,10);
  const userSessions = state.sessions[username];
  if (!userSessions) return 0;
  let total = 0;
  Object.values(userSessions).forEach(s => { if(s.day===dk) total+=s.duration; });
  return Math.round(total * 10) / 10;
}

async function logSession(username, duration, label) {
  const entry = { duration, label, week: weekKey(), day: dayKey(), ts: Date.now() };
  const key = 'sess_' + Date.now();
  const ok = await fbSet(`sessions/${username}/${key}`, entry);
  if (!ok) {
    // Offline fallback
    const users = LS.get('sessions') || {};
    if (!users[username]) users[username] = {};
    users[username][key] = entry;
    LS.set('sessions', users);
    if (!state.sessions[username]) state.sessions[username] = {};
    state.sessions[username][key] = entry;
  } else {
    if (!state.sessions[username]) state.sessions[username] = {};
    state.sessions[username][key] = entry;
  }
}

// ─────────────────────────────────────────────────────────────
// AUTH
// ─────────────────────────────────────────────────────────────
async function login(username, password) {
  // Try Firebase first
  let user = await fbGet(`users/${username}`);
  // Fallback to localStorage
  if (!user) {
    const local = LS.get('users') || {};
    user = local[username];
  }
  if (!user) return { ok: false, err: 'User not found.' };
  if (user.password !== password) return { ok: false, err: 'Wrong password.' };
  return { ok: true, user };
}

async function signup(username, displayName, password, goal, resetDay) {
  // Check existing
  let existing = await fbGet(`users/${username}`);
  if (!existing) {
    const local = LS.get('users') || {};
    existing = local[username];
  }
  if (existing) return { ok: false, err: 'Username already taken.' };

  const user = {
    username, displayName, password, goal: goal || 40,
    resetDay: resetDay !== undefined ? resetDay : 1,
    createdAt: Date.now()
  };

  const ok = await fbSet(`users/${username}`, user);
  if (!ok) {
    const local = LS.get('users') || {};
    local[username] = user;
    LS.set('users', local);
    if (!state.users) state.users = {};
    state.users[username] = user;
  }
  return { ok: true, user };
}

// ─────────────────────────────────────────────────────────────
// RENDER ENGINE
// ─────────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');
  if (!state.user) {
    renderAuth(app);
  } else {
    renderMain();
  }
}

function renderMain() {
  const app = document.getElementById('app');
  if (!state.user) return;

  let html = renderNav();
  html += '<div class="content">';
  if (state.tab === 'dashboard') html += renderDashboard();
  else if (state.tab === 'rooms') html += renderRooms();
  else if (state.tab === 'goal') html += renderGoal();
  html += '</div>';
  if (state.showCreateRoom) html += renderCreateRoomModal();
  app.innerHTML = html;
  bindEvents();
  if (state.msg) { showNotif(state.msg, state.msgType); state.msg = ''; }
}

// AUTH UI
// ─────────────────────────────────────────────────────────────
function renderAuth(app) {
  app.innerHTML = `
  <div class="auth-screen">
    <div class="auth-logo">StudySync</div>
    <div class="auth-tagline">Study together. Stay accountable.</div>
    <div class="auth-card">
      <div class="auth-tabs">
        <div class="auth-tab active" id="tab-login">Sign in</div>
        <div class="auth-tab" id="tab-signup">Sign up</div>
      </div>
      <div id="auth-form"></div>
    </div>
  </div>`;

  renderAuthForm('login');
  document.getElementById('tab-login').onclick = () => {
    document.getElementById('tab-login').classList.add('active');
    document.getElementById('tab-signup').classList.remove('active');
    renderAuthForm('login');
  };
  document.getElementById('tab-signup').onclick = () => {
    document.getElementById('tab-signup').classList.add('active');
    document.getElementById('tab-login').classList.remove('active');
    renderAuthForm('signup');
  };
}

function renderAuthForm(mode) {
  const f = document.getElementById('auth-form');
  if (mode === 'login') {
    f.innerHTML = `
      <div class="field-group"><div class="field-label">Username</div><input class="field-input" id="fi-user" placeholder="your username" autocomplete="username"></div>
      <div class="field-group"><div class="field-label">Password</div><input class="field-input" id="fi-pass" type="password" placeholder="••••••••" autocomplete="current-password"></div>
      <button class="btn-primary" id="btn-auth">Sign in</button>
      <div class="auth-err" id="auth-err"></div>`;

    const doLogin = async () => {
      const btn = document.getElementById('btn-auth');
      btn.textContent = 'Signing in…'; btn.disabled = true;
      const u = document.getElementById('fi-user').value.trim().toLowerCase();
      const p = document.getElementById('fi-pass').value;
      const res = await login(u, p);
      if (!res.ok) {
        document.getElementById('auth-err').textContent = res.err;
        btn.textContent = 'Sign in'; btn.disabled = false;
        return;
      }
      state.user = u;
      LS.set('session', u);
      startSync();
      render();
    };

    document.getElementById('btn-auth').onclick = doLogin;
    document.getElementById('fi-pass').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });

  } else {
    const dayOpts = DAYS_FULL.map((d,i) => `<option value="${i}" ${i===1?'selected':''}>${d}</option>`).join('');
    f.innerHTML = `
      <div class="field-group"><div class="field-label">Display name</div><input class="field-input" id="fi-dname" placeholder="e.g. Beshoy" autocomplete="name"></div>
      <div class="field-group"><div class="field-label">Username</div><input class="field-input" id="fi-user" placeholder="lowercase, no spaces" autocomplete="username"></div>
      <div class="field-group"><div class="field-label">Password</div><input class="field-input" id="fi-pass" type="password" placeholder="••••••••" autocomplete="new-password"></div>
      <div class="field-group"><div class="field-label">Weekly goal (hours)</div><input class="field-input" id="fi-goal" type="number" placeholder="e.g. 40" min="1" max="168"></div>
      <div class="field-group"><div class="field-label">Week resets every</div>
        <select class="field-input" id="fi-reset">${dayOpts}</select>
      </div>
      <button class="btn-primary" id="btn-auth">Create account</button>
      <div class="auth-err" id="auth-err"></div>`;

    document.getElementById('btn-auth').onclick = async () => {
      const btn = document.getElementById('btn-auth');
      btn.textContent = 'Creating…'; btn.disabled = true;
      const dn = document.getElementById('fi-dname').value.trim();
      const u  = document.getElementById('fi-user').value.trim().toLowerCase().replace(/\s+/g,'');
      const p  = document.getElementById('fi-pass').value;
      const g  = parseInt(document.getElementById('fi-goal').value) || 40;
      const rd = parseInt(document.getElementById('fi-reset').value);
      const err = document.getElementById('auth-err');

      if (!dn || !u || !p) { err.textContent='Please fill all fields.'; btn.textContent='Create account'; btn.disabled=false; return; }
      if (u.length < 3) { err.textContent='Username must be ≥ 3 chars.'; btn.textContent='Create account'; btn.disabled=false; return; }

      const res = await signup(u, dn, p, g, rd);
      if (!res.ok) { err.textContent=res.err; btn.textContent='Create account'; btn.disabled=false; return; }

      state.user = u;
      state.users[u] = res.user;
      LS.set('session', u);
      startSync();
      render();
    };
  }
}

// ─────────────────────────────────────────────────────────────
// DASHBOARD
// ─────────────────────────────────────────────────────────────
function renderDashboard() {
  const u = state.users[state.user] || {};
  const weekHrs = getUserWeekHours(state.user);
  const goal = u.goal || 40;
  const resetDay = u.resetDay !== undefined ? u.resetDay : 1;
  const pct = Math.min(100, Math.round((weekHrs / goal) * 100));
  const remaining = Math.max(0, goal - weekHrs);
  const timerRunning = state.timer.running;

  const barColor = pct >= 100 ? '#3ecf8e' : pct >= 60 ? '#6c8fff' : pct >= 30 ? '#f5a623' : '#ef4444';
  const statusPill = pct >= 100
    ? '<span class="pill pill-green">🎉 Goal reached!</span>'
    : pct >= 60 ? '<span class="pill pill-green">On track</span>'
    : pct >= 30 ? '<span class="pill pill-amber">Keep going</span>'
    : '<span class="pill pill-red">Needs effort</span>';

  const userSessions = state.sessions[state.user] || {};
  const sessArr = Object.values(userSessions).sort((a,b) => b.ts - a.ts).slice(0, 5);

  // Build day bars aligned to reset day
  const today = new Date();
  const dow = today.getDay();
  const diffFromReset = (dow - resetDay + 7) % 7;
  const dayLabels = [];
  const dayHrs = [];
  for (let i = diffFromReset; i >= 0; i--) {
    const d = new Date(today); d.setDate(today.getDate() - i);
    dayLabels.push(DAYS_SHORT[d.getDay()]);
    dayHrs.push(getUserDayHours(state.user, i));
  }
  const maxDay = Math.max(...dayHrs, 0.01);
  let dayBars = dayLabels.map((lbl, i) => {
    const isToday = i === dayLabels.length - 1;
    const hPct = Math.round((dayHrs[i] / maxDay) * 100);
    return `<div class="day-bar-wrap">
      <div class="day-bar-bg"><div class="day-bar" style="height:${hPct}%;background:${isToday?'#6c8fff':'#3ecf8e'};opacity:${isToday?1:0.6}"></div></div>
      <div class="day-lbl" style="color:${isToday?'#6c8fff':''}">${lbl}</div>
    </div>`;
  }).join('');

  let sessionLog = sessArr.length === 0
    ? '<div class="empty">No sessions yet. Start studying!</div>'
    : sessArr.map(s => {
        const d = new Date(s.ts);
        return `<div class="session-item">
          <div><div class="session-lbl">${s.label||'Study session'}</div>
          <div class="session-date">${d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}</div></div>
          <div class="session-time">+${fmtHrs(s.duration)}</div>
        </div>`;
      }).join('');

  const resetDayName = DAYS_FULL[resetDay];

  return `
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-val" style="color:#6c8fff">${fmtHrs(weekHrs)}</div>
      <div class="stat-lbl">This week</div>
      <div class="stat-sub">Goal: ${goal}h</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" style="color:${pct>=100?'#3ecf8e':'#f5a623'}">${pct}%</div>
      <div class="stat-lbl">Progress</div>
      <div class="stat-sub">${statusPill}</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" style="color:#a78bfa">${remaining > 0 ? fmtHrs(remaining) : '—'}</div>
      <div class="stat-lbl">Remaining</div>
      <div class="stat-sub">${remaining > 0 ? 'to hit your goal' : 'Goal complete!'}</div>
    </div>
  </div>

  <div class="goal-bar-wrap">
    <div class="section-title">Weekly goal progress <span class="live-badge"><span class="live-dot"></span>LIVE</span></div>
    <div class="goal-bar-bg"><div class="goal-bar-fill" style="width:${pct}%;background:${barColor}"></div></div>
    <div class="goal-info"><span>${fmtHrs(weekHrs)} studied</span><span>${goal}h goal</span></div>
  </div>

  <div style="background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:20px;">
    <div class="section-title" style="margin-bottom:10px">This week by day</div>
    <div class="week-chart">${dayBars}</div>
    <div style="font-size:10px;color:var(--text3);margin-top:10px">Week resets every ${resetDayName}</div>
  </div>

  <div class="timer-card">
    <div>
      <div class="timer-display" style="color:${timerRunning?'#3ecf8e':'#e8eaf0'}" id="timer-display">${fmtTimer(state.timer.elapsed)}</div>
      <div class="timer-status">${timerRunning?'Session in progress…':'Ready to study?'}</div>
      ${timerRunning?`<input class="field-input" id="session-label" placeholder="What are you studying?" style="margin-top:10px;max-width:240px;font-size:12px;padding:7px 10px" value="${state.timer.label}">`:``}
    </div>
    <div class="timer-btns">
      ${!timerRunning
        ? `<button class="btn-timer btn-start" onclick="startTimer()">▶ Start session</button>`
        : `<button class="btn-timer btn-stop" onclick="stopTimer()">■ Stop & save</button>`}
    </div>
  </div>

  <div class="section-title">Recent sessions</div>
  <div class="session-log-wrap">${sessionLog}</div>`;
}

// ─────────────────────────────────────────────────────────────
// ROOMS
// ─────────────────────────────────────────────────────────────
function renderRooms() {
  if (state.roomView) return renderRoomDetail(state.roomView);

  const myRooms = Object.values(state.rooms).filter(r =>
    r.owner === state.user || (r.members||[]).includes(state.user)
  );

  let cards = myRooms.map(r => {
    const isOwner = r.owner === state.user;
    const allMembers = [r.owner, ...(r.members||[])];
    let avatars = allMembers.slice(0,5).map(m => {
      const u2 = state.users[m];
      const name = u2 ? u2.displayName : m;
      return `<div class="mini-avatar" style="background:${getColor(m)}">${getInitials(name)}</div>`;
    }).join('');
    return `<div class="room-card ${isOwner?'mine':''}" onclick="openRoom('${r.id}')">
      <div class="room-badge ${isOwner?'badge-owner':'badge-member'}">${isOwner?'OWNER':'MEMBER'}</div>
      <div class="room-name">${r.name}</div>
      <div class="room-meta">${allMembers.length} member${allMembers.length!==1?'s':''}</div>
      <div class="room-members">${avatars}</div>
    </div>`;
  }).join('');

  if (myRooms.length === 0) {
    cards = '<div style="grid-column:1/-1"><div class="empty">No rooms yet. Create one or ask a friend to invite you!</div></div>';
  }

  return `
  <div class="section-title">Your rooms <span class="live-badge"><span class="live-dot"></span>LIVE</span></div>
  <div class="rooms-grid">${cards}</div>
  <button class="btn-create-room" onclick="showCreateRoom()">+ Create new room</button>`;
}

function renderRoomDetail(roomId) {
  const room = state.rooms[roomId];
  if (!room) return '<div class="empty">Room not found.</div>';

  const allMembers = [room.owner, ...(room.members||[])];
  const isOwner = room.owner === state.user;

  let rows = allMembers.map(m => {
    const u2 = state.users[m];
    if (!u2) return '';
    const wh = getUserWeekHours(m);
    const g = u2.goal || 40;
    const pct = Math.min(100, Math.round((wh/g)*100));
    const barColor = pct>=100?'#3ecf8e':pct>=60?'#6c8fff':pct>=30?'#f5a623':'#ef4444';
    const isMe = m === state.user;
    return `<div class="member-row">
      <div class="member-avatar" style="background:${getColor(m)}">${getInitials(u2.displayName)}</div>
      <div class="member-info">
        <div class="member-name">${u2.displayName}${isMe?' <span style="color:var(--text3);font-size:11px">(you)</span>':''}${m===room.owner?' 👑':''}</div>
        <div class="member-goal-lbl">Goal: ${g}h/week · Resets ${DAYS_FULL[u2.resetDay||1]}</div>
        <div class="member-bar-bg"><div class="member-bar" style="width:${pct}%;background:${barColor}"></div></div>
      </div>
      <div class="member-progress">
        <div class="member-hrs" style="color:${barColor}">${fmtHrs(wh)}</div>
        <div class="member-pct">${pct}%</div>
      </div>
    </div>`;
  }).join('');

  const inviteSection = isOwner ? `
    <div class="invite-section">
      <div class="section-title" style="margin-bottom:10px">Invite a member</div>
      <div class="invite-row">
        <input class="invite-input" id="invite-user" placeholder="Enter username…">
        <button class="btn-invite" onclick="inviteUser('${roomId}')">Invite</button>
      </div>
      <div id="invite-msg" style="font-size:12px;margin-top:8px;"></div>
    </div>` : `<div style="font-size:12px;color:var(--text3);margin-top:16px;padding-top:12px;border-top:0.5px solid var(--border)">Ask the room owner to invite more members.</div>`;

  const leaveBtn = !isOwner
    ? `<button class="btn-cancel" style="margin-top:12px;width:100%" onclick="leaveRoom('${roomId}')">Leave room</button>`
    : `<button class="btn-danger" onclick="deleteRoom('${roomId}')">Delete room</button>`;

  return `
  <div class="room-detail">
    <div class="room-detail-header">
      <div>
        <div class="room-detail-title">${room.name} <span class="live-badge"><span class="live-dot"></span>LIVE</span></div>
        <div style="font-size:12px;color:var(--text2)">${allMembers.length} member${allMembers.length!==1?'s':''} · Real-time progress</div>
      </div>
      <button class="btn-back" onclick="closeRoom()">← Back</button>
    </div>
    ${rows}
    ${inviteSection}
    ${leaveBtn}
  </div>`;
}

// ─────────────────────────────────────────────────────────────
function renderGoal() {
  const u = state.users[state.user] || {};
  const goal = u.goal || 40;
  const resetDay = u.resetDay !== undefined ? u.resetDay : 1;
  const weekHrs = getUserWeekHours(state.user);

  const quickOpts = [20, 30, 40, 50, 60, 80].map(g =>
    `<div class="goal-opt ${goal===g?'selected':''}" onclick="setGoal(${g})">
      <div class="goal-opt-val">${g}</div><div class="goal-opt-lbl">hrs/week</div>
    </div>`
  ).join('');

  const resetOpts = DAYS_SHORT.map((d,i) =>
    `<div class="reset-day-opt ${resetDay===i?'selected':''}" onclick="setResetDay(${i})">${d}</div>`
  ).join('');

  return `
  <div class="settings-card">
    <div class="settings-title">Weekly study goal</div>
    <div class="section-title">Quick pick</div>
    <div class="goal-picker" style="grid-template-columns:repeat(6,1fr)">${quickOpts}</div>
    <div class="section-title" style="margin-top:16px;margin-bottom:10px">Custom goal</div>
    <div class="custom-goal-row">
      <input class="custom-goal-input" id="custom-goal" type="number" value="${goal}" min="1" max="168">
      <span style="font-size:13px;color:var(--text2)">hours / week</span>
      <button class="btn-save" onclick="saveCustomGoal()">Save</button>
    </div>
    <div id="goal-msg" class="msg"></div>
  </div>

  <div class="settings-card">
    <div class="settings-title">Week reset day</div>
    <div style="font-size:12px;color:var(--text2);margin-bottom:14px">Your weekly hours reset at midnight on the chosen day.</div>
    <div class="reset-day-grid">${resetOpts}</div>
    <div id="reset-msg" class="msg"></div>
  </div>

  <div class="settings-card">
    <div class="settings-title">Your stats this week</div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:10px">
      <div class="stat-card"><div class="stat-val" style="color:#6c8fff;font-size:20px">${fmtHrs(weekHrs)}</div><div class="stat-lbl">Studied</div></div>
      <div class="stat-card"><div class="stat-val" style="color:#a78bfa;font-size:20px">${goal}h</div><div class="stat-lbl">Goal</div></div>
      <div class="stat-card"><div class="stat-val" style="color:#3ecf8e;font-size:20px">${Math.min(100,Math.round(weekHrs/goal*100))}%</div><div class="stat-lbl">Done</div></div>
    </div>
    <div class="week-reset-note">Resets every ${DAYS_FULL[resetDay]} at midnight.</div>
  </div>`;
}

// ─────────────────────────────────────────────────────────────
// MODALS
// ─────────────────────────────────────────────────────────────
function renderCreateRoomModal() {
  return `<div class="modal-overlay" onclick="if(event.target===this)hideCreateRoom()">
    <div class="modal">
      <div class="modal-title">Create a study room</div>
      <div class="field-group">
        <div class="field-label">Room name</div>
        <input class="field-input" id="room-name-input" placeholder="e.g. A-Level Grind, Med Squad…" autofocus>
      </div>
      <div class="modal-btns">
        <button class="btn-cancel" onclick="hideCreateRoom()">Cancel</button>
        <button class="btn-confirm" onclick="createRoom()">Create room</button>
      </div>
    </div>
  </div>`;
}

// ─────────────────────────────────────────────────────────────
// ACTIONS
// ─────────────────────────────────────────────────────────────
window.goTab = t => { state.tab = t; state.roomView = null; renderMain(); };
window.logout = () => {
  clearInterval(state.timer.interval);
  state.timer = { running: false, elapsed: 0, interval: null, label: '' };
  stopAllListeners();
  state.user = null; state.tab = 'dashboard'; state.roomView = null;
  LS.set('session', null);
  render();
};
window.openRoom = id => { state.roomView = id; renderMain(); };
window.closeRoom = () => { state.roomView = null; renderMain(); };
window.showCreateRoom = () => { state.showCreateRoom = true; renderMain(); };
window.hideCreateRoom = () => { state.showCreateRoom = false; renderMain(); };

window.setGoal = async g => {
  const ok = await fbUpdate(`users/${state.user}`, { goal: g });
  if (!ok) { if(state.users[state.user]) state.users[state.user].goal = g; }
  else { if(state.users[state.user]) state.users[state.user].goal = g; }
  renderMain();
};

window.saveCustomGoal = async () => {
  const g = parseInt(document.getElementById('custom-goal').value);
  const el = document.getElementById('goal-msg');
  if (!g || g < 1 || g > 168) { el.style.color='#ef4444'; el.textContent='Enter a valid number (1–168).'; return; }
  await fbUpdate(`users/${state.user}`, { goal: g });
  if (state.users[state.user]) state.users[state.user].goal = g;
  el.style.color='var(--green)'; el.textContent='Goal saved!';
  setTimeout(renderMain, 800);
};

window.setResetDay = async day => {
  await fbUpdate(`users/${state.user}`, { resetDay: day });
  if (state.users[state.user]) state.users[state.user].resetDay = day;
  const el = document.getElementById('reset-msg');
  if (el) { el.style.color='var(--green)'; el.textContent=`Reset day set to ${DAYS_FULL[day]}.`; }
  setTimeout(renderMain, 800);
};

window.createRoom = async () => {
  const name = document.getElementById('room-name-input').value.trim();
  if (!name) return;
  const id = 'room_' + Date.now();
  const room = { id, name, owner: state.user, members: [], createdAt: Date.now() };
  await fbSet(`rooms/${id}`, room);
  state.rooms[id] = room;
  state.showCreateRoom = false;
  state.tab = 'rooms';
  state.msg = 'Room created!';
  renderMain();
};

window.inviteUser = async (roomId) => {
  const username = document.getElementById('invite-user').value.trim().toLowerCase();
  const msgEl = document.getElementById('invite-msg');
  if (!username) return;
  const room = state.rooms[roomId];
  if (!room) return;
  if (!state.users[username]) { msgEl.style.color='#ef4444'; msgEl.textContent='User not found.'; return; }
  if (username === state.user) { msgEl.style.color='#ef4444'; msgEl.textContent="That's you!"; return; }
  if (room.owner === username || (room.members||[]).includes(username)) {
    msgEl.style.color='#f5a623'; msgEl.textContent='Already in this room.'; return;
  }
  const members = [...(room.members||[]), username];
  await fbUpdate(`rooms/${roomId}`, { members });
  room.members = members;
  msgEl.style.color='#3ecf8e';
  msgEl.textContent=`${state.users[username].displayName} added!`;
  document.getElementById('invite-user').value = '';
  setTimeout(renderMain, 600);
};

window.leaveRoom = async (roomId) => {
  const room = state.rooms[roomId];
  if (!room) return;
  const members = (room.members||[]).filter(m => m !== state.user);
  await fbUpdate(`rooms/${roomId}`, { members });
  room.members = members;
  state.roomView = null;
  state.msg = 'You left the room.';
  renderMain();
};

window.deleteRoom = async (roomId) => {
  if (!confirm('Delete this room? This cannot be undone.')) return;
  await fbRemove(`rooms/${roomId}`);
  delete state.rooms[roomId];
  state.roomView = null;
  state.msg = 'Room deleted.';
  renderMain();
};

// ─────────────────────────────────────────────────────────────
// TIMER
// ─────────────────────────────────────────────────────────────
window.startTimer = () => {
  if (state.timer.running) return;
  state.timer.running = true;
  state.timer.elapsed = 0;
  state.timer.interval = setInterval(() => {
    state.timer.elapsed++;
    const el = document.getElementById('timer-display');
    if (el) el.textContent = fmtTimer(state.timer.elapsed);
    const lbl = document.getElementById('session-label');
    if (lbl) state.timer.label = lbl.value;
  }, 1000);
  renderMain();
};

window.stopTimer = async () => {
  if (!state.timer.running) return;
  clearInterval(state.timer.interval);
  const elapsed = state.timer.elapsed;
  const lbl = state.timer.label || 'Study session';
  state.timer.running = false; state.timer.elapsed = 0; state.timer.label = '';
  if (elapsed >= 60) {
    const hours = elapsed / 3600;
    await logSession(state.user, hours, lbl);
    state.msg = `Session saved: ${fmtHrs(hours)} logged!`;
  } else {
    state.msg = 'Session too short (min 1 min).';
    state.msgType = 'err';
  }
  renderMain();
};

// ─────────────────────────────────────────────────────────────
// NOTIFICATIONS
// ─────────────────────────────────────────────────────────────
function showNotif(msg, type = 'ok') {
  const n = document.createElement('div');
  n.className = 'notif' + (type === 'err' ? ' err' : '');
  n.textContent = msg;
  document.body.appendChild(n);
  setTimeout(() => n.remove(), 3200);
}

function bindEvents() {
  const lbl = document.getElementById('session-label');
  if (lbl) lbl.oninput = e => { state.timer.label = e.target.value; };
}

// ─────────────────────────────────────────────────────────────
// BOOT
// ─────────────────────────────────────────────────────────────
async function boot() {
  // Check persisted session
  const saved = LS.get('session');
  if (saved) {
    state.user = saved;
    startSync();
    // Wait a moment for Firebase to hydrate
    await new Promise(r => setTimeout(r, firebaseReady ? 1200 : 0));
  }
  document.getElementById('loading-overlay').remove();
  render();
}

boot();
</script>
</body>
</html>
