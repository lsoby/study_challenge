<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0d0f14">
<meta name="description" content="Study together. Stay accountable.">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.svg">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="StudySync">
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js').then(reg => {
        // Listen for elapsed time responses from SW
        navigator.serviceWorker.addEventListener('message', e => {
          if (e.data && e.data.type === 'ELAPSED_RESPONSE') {
            window._swElapsed = e.data.elapsed;
          }
        });
      }).catch(() => {});
    });
  }
</script>
<title>StudySync</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0d0f14; --bg2: #141720; --bg3: #1c2030; --bg4: #232840;
  --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.14);
  --text: #e8eaf0; --text2: #8b90a8; --text3: #555d7a;
  --accent: #6c8fff; --accent2: #4d6fd4;
  --green: #3ecf8e; --green2: #2aaf74;
  --amber: #f5a623; --red: #ef4444; --purple: #a78bfa;
  --font: 'Sora', sans-serif; --mono: 'Space Mono', monospace;
  --radius: 12px; --radius-lg: 18px;
}
html, body { height: 100%; }
body { font-family: var(--font); background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.6; min-height: 100vh; }
.app { display: flex; flex-direction: column; min-height: 100vh; }
.content { flex: 1; overflow-y: auto; padding: 24px 20px; max-width: 860px; margin: 0 auto; width: 100%; }

/* AUTH */
.auth-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; flex-direction: column; background: linear-gradient(135deg, #0d0f14 0%, #141028 50%, #0d0f14 100%); padding: 20px; }
.auth-logo { font-family: var(--mono); font-size: 28px; font-weight: 700; letter-spacing: -1px; margin-bottom: 6px; background: linear-gradient(90deg, #6c8fff, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.auth-tagline { color: var(--text2); font-size: 13px; margin-bottom: 36px; }
.auth-card { background: var(--bg2); border: 0.5px solid var(--border2); border-radius: var(--radius-lg); padding: 32px; width: 100%; max-width: 360px; }
.auth-tabs { display: flex; gap: 4px; margin-bottom: 28px; background: var(--bg); border-radius: 8px; padding: 4px; }
.auth-tab { flex: 1; padding: 8px; text-align: center; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; color: var(--text2); transition: all 0.2s; }
.auth-tab.active { background: var(--bg4); color: var(--text); }
.field-label { font-size: 12px; color: var(--text2); margin-bottom: 6px; font-weight: 500; letter-spacing: 0.3px; }
.field-group { margin-bottom: 16px; }
.field-input { width: 100%; background: var(--bg3); border: 0.5px solid var(--border2); border-radius: 8px; padding: 10px 12px; color: var(--text); font-family: var(--font); font-size: 13px; outline: none; transition: border-color 0.2s; }
.field-input:focus { border-color: var(--accent); }
.field-input::placeholder { color: var(--text3); }
select.field-input { cursor: pointer; } select.field-input option { background: var(--bg3); }
.btn-primary { width: 100%; padding: 12px; background: var(--accent); border: none; border-radius: 8px; color: white; font-family: var(--font); font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; margin-top: 8px; }
.btn-primary:hover { background: var(--accent2); }
.auth-err { color: var(--red); font-size: 12px; margin-top: 10px; text-align: center; min-height: 18px; }

/* NAV */
.nav { display: flex; align-items: center; padding: 0 20px; height: 52px; border-bottom: 0.5px solid var(--border); background: var(--bg2); flex-shrink: 0; position: sticky; top: 0; z-index: 50; }
.nav-logo { font-family: var(--mono); font-size: 16px; font-weight: 700; letter-spacing: -0.5px; background: linear-gradient(90deg, #6c8fff, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; white-space: nowrap; }
.nav-tabs { display: flex; gap: 2px; margin-left: 20px; flex: 1; overflow-x: auto; }
.nav-tabs::-webkit-scrollbar { display: none; }
.nav-tab { padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 500; color: var(--text2); transition: all 0.2s; white-space: nowrap; flex-shrink: 0; }
.nav-tab.active { background: var(--bg4); color: var(--text); }
.nav-tab:hover:not(.active) { color: var(--text); }
.nav-user { display: flex; align-items: center; gap: 8px; margin-left: auto; padding-left: 10px; flex-shrink: 0; }
.nav-avatar { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; flex-shrink: 0; }
.nav-name { font-size: 13px; font-weight: 500; max-width: 90px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.btn-logout { padding: 4px 10px; background: transparent; border: 0.5px solid var(--border2); border-radius: 6px; color: var(--text2); cursor: pointer; font-size: 12px; font-family: var(--font); transition: all 0.2s; }
.btn-logout:hover { border-color: var(--red); color: var(--red); }
.sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text3); transition: background 0.4s; flex-shrink: 0; }
.sync-dot.live { background: var(--green); box-shadow: 0 0 6px var(--green); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.4} }
.live-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 10px; background: rgba(62,207,142,0.1); color: var(--green); padding: 3px 8px; border-radius: 20px; border: 0.5px solid rgba(62,207,142,0.3); margin-left: 8px; }
.live-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--green); animation: pulse 1.5s infinite; }

/* LOADING */
.loading-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 999; flex-direction: column; gap: 16px; }
.loading-logo { font-family: var(--mono); font-size: 24px; font-weight: 700; background: linear-gradient(90deg, #6c8fff, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.loading-spinner { width: 28px; height: 28px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* SECTION */
.section-title { font-size: 11px; font-weight: 600; letter-spacing: 1.2px; text-transform: uppercase; color: var(--text3); margin-bottom: 14px; }

/* STATS */
.stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
.stat-card { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 16px; }
.stat-val { font-family: var(--mono); font-size: 24px; font-weight: 700; line-height: 1; margin-bottom: 4px; }
.stat-lbl { font-size: 11px; color: var(--text2); font-weight: 500; }
.stat-sub { font-size: 10px; color: var(--text3); margin-top: 2px; }

/* PROGRESS BAR */
.goal-bar-wrap { margin-bottom: 20px; }
.goal-bar-bg { height: 8px; background: var(--bg3); border-radius: 4px; overflow: hidden; margin: 10px 0 6px; }
.goal-bar-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease; }
.goal-info { display: flex; justify-content: space-between; font-size: 12px; color: var(--text2); }

/* DAILY REQUIREMENT CARD */
.daily-card { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 20px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
.daily-info { flex: 1; min-width: 160px; }
.daily-title { font-size: 12px; color: var(--text2); margin-bottom: 2px; }
.daily-val { font-family: var(--mono); font-size: 22px; font-weight: 700; }
.daily-bar-bg { height: 5px; background: var(--bg3); border-radius: 3px; margin-top: 8px; }
.daily-bar { height: 100%; border-radius: 3px; transition: width 0.5s; }
.daily-edit { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.daily-input { width: 70px; background: var(--bg3); border: 0.5px solid var(--border2); border-radius: 7px; padding: 7px 8px; color: var(--text); font-family: var(--mono); font-size: 15px; font-weight: 700; text-align: center; outline: none; }
.daily-input:focus { border-color: var(--accent); }
.btn-sm { padding: 7px 12px; background: var(--accent); border: none; border-radius: 7px; color: white; font-family: var(--font); font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap; }
.btn-sm:hover { background: var(--accent2); }
.btn-sm.green { background: var(--green); color: #0a1f14; }
.btn-sm.green:hover { background: var(--green2); }

/* TIMER */
.timer-card { background: var(--bg2); border: 0.5px solid var(--border2); border-radius: var(--radius-lg); padding: 20px; margin-bottom: 20px; }
.timer-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
.timer-left { flex: 1; min-width: 200px; }
.timer-display { font-family: var(--mono); font-size: 44px; font-weight: 700; letter-spacing: 3px; transition: color 0.3s; line-height: 1; }
.timer-status { font-size: 12px; color: var(--text2); margin-top: 5px; }
.timer-meta { margin-top: 12px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.timer-subject-select { background: var(--bg3); border: 0.5px solid var(--border2); border-radius: 7px; padding: 7px 10px; color: var(--text); font-family: var(--font); font-size: 12px; outline: none; cursor: pointer; max-width: 180px; }
.timer-subject-select:focus { border-color: var(--accent); }
.timer-subject-select option { background: var(--bg3); }
.timer-label-inp { background: var(--bg3); border: 0.5px solid var(--border2); border-radius: 7px; padding: 7px 10px; color: var(--text); font-family: var(--font); font-size: 12px; outline: none; width: 180px; }
.timer-label-inp:focus { border-color: var(--accent); }
.timer-label-inp::placeholder { color: var(--text3); }
.timer-btns { display: flex; gap: 8px; align-items: flex-start; flex-shrink: 0; }
.btn-timer { padding: 11px 20px; border-radius: 8px; cursor: pointer; font-family: var(--font); font-size: 13px; font-weight: 600; border: none; transition: all 0.2s; }
.btn-start { background: var(--green); color: #0a1f14; }
.btn-start:hover { background: var(--green2); }
.btn-pause { background: var(--amber); color: #1a1000; }
.btn-pause:hover { filter: brightness(0.9); }
.btn-stop { background: var(--bg3); border: 0.5px solid var(--border2); color: var(--text); }
.btn-stop:hover { background: var(--red); border-color: var(--red); color: white; }

/* SUBJECTS */
.subjects-section { margin-bottom: 20px; }
.subjects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; margin-bottom: 12px; }
.subject-card { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 14px; cursor: pointer; transition: all 0.2s; position: relative; }
.subject-card:hover { border-color: var(--border2); }
.subject-card.active-subject { border-color: var(--accent); background: rgba(108,143,255,0.07); }
.subject-name { font-size: 13px; font-weight: 600; margin-bottom: 3px; display: flex; align-items: center; gap: 6px; }
.subject-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.subject-hrs { font-family: var(--mono); font-size: 16px; font-weight: 700; margin-bottom: 2px; }
.subject-pct { font-size: 10px; color: var(--text2); }
.subject-bar-bg { height: 3px; background: var(--bg3); border-radius: 2px; margin-top: 8px; }
.subject-bar { height: 100%; border-radius: 2px; }
.subject-del { position: absolute; top: 8px; right: 8px; width: 18px; height: 18px; background: none; border: none; color: var(--text3); cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; border-radius: 3px; opacity: 0; transition: opacity 0.15s; line-height: 1; }
.subject-card:hover .subject-del { opacity: 1; }
.subject-del:hover { color: var(--red); }
.btn-add-subject { background: var(--bg2); border: 0.5px dashed var(--border2); border-radius: var(--radius); padding: 14px; color: var(--text2); cursor: pointer; font-family: var(--font); font-size: 12px; font-weight: 500; display: flex; align-items: center; justify-content: center; gap: 6px; transition: all 0.2s; width: 100%; }
.btn-add-subject:hover { border-color: var(--accent); color: var(--accent); }

/* WEEK CHART */
.chart-card { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 20px; }
.week-chart { display: flex; align-items: flex-end; gap: 5px; height: 80px; margin-top: 12px; }
.day-bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
.day-bar-bg { width: 100%; background: var(--bg3); border-radius: 3px; flex: 1; display: flex; align-items: flex-end; }
.day-bar { width: 100%; border-radius: 3px; transition: height 0.4s; }
.day-lbl { font-size: 9px; color: var(--text3); font-family: var(--mono); }
.day-hrs-lbl { font-size: 8px; color: var(--text3); font-family: var(--mono); }

/* SESSION LOG */
.session-log-wrap { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 16px; }
.session-item { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 0.5px solid var(--border); }
.session-item:last-child { border-bottom: none; }
.session-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.session-info { flex: 1; min-width: 0; }
.session-lbl { font-size: 13px; font-weight: 500; }
.session-subject-tag { display: inline-block; padding: 1px 6px; border-radius: 4px; font-size: 10px; font-weight: 600; margin-left: 6px; vertical-align: middle; }
.session-meta { font-size: 11px; color: var(--text3); margin-top: 1px; }
.session-time { font-family: var(--mono); font-size: 13px; font-weight: 700; flex-shrink: 0; }

/* ROOMS */
.rooms-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 20px; }
@media (max-width: 480px) { .rooms-grid { grid-template-columns: 1fr; } }
.room-card { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 18px; cursor: pointer; transition: all 0.2s; position: relative; }
.room-card:hover { border-color: var(--accent); background: var(--bg3); }
.room-card.mine { border-color: rgba(108,143,255,0.35); }
.room-name { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
.room-meta { font-size: 12px; color: var(--text2); }
.room-members { display: flex; margin-top: 12px; }
.mini-avatar { width: 24px; height: 24px; border-radius: 50%; font-size: 10px; font-weight: 600; display: flex; align-items: center; justify-content: center; border: 1.5px solid var(--bg2); margin-left: -6px; }
.mini-avatar:first-child { margin-left: 0; }
.room-badge { position: absolute; top: 12px; right: 12px; font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 4px; }
.badge-owner { background: rgba(108,143,255,0.18); color: var(--accent); }
.badge-member { background: rgba(62,207,142,0.14); color: var(--green); }
.btn-create-room { width: 100%; padding: 14px; background: var(--bg2); border: 0.5px dashed var(--border2); border-radius: var(--radius-lg); color: var(--text2); cursor: pointer; font-family: var(--font); font-size: 13px; font-weight: 500; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
.btn-create-room:hover { border-color: var(--accent); color: var(--accent); }

/* ROOM DETAIL */
.room-detail { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 20px; }
.room-detail-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 20px; gap: 12px; }
.room-detail-title { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
.btn-back { background: var(--bg3); border: 0.5px solid var(--border2); border-radius: 6px; padding: 6px 12px; color: var(--text2); cursor: pointer; font-family: var(--font); font-size: 12px; white-space: nowrap; }
.btn-back:hover { color: var(--text); }
.member-row { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 0.5px solid var(--border); }
.member-row:last-child { border-bottom: none; }
.member-avatar { width: 36px; height: 36px; border-radius: 50%; font-size: 13px; font-weight: 600; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.member-info { flex: 1; min-width: 0; }
.member-name { font-size: 13px; font-weight: 500; }
.member-goal-lbl { font-size: 11px; color: var(--text2); }
.member-progress { text-align: right; flex-shrink: 0; }
.member-hrs { font-family: var(--mono); font-size: 15px; font-weight: 700; }
.member-pct { font-size: 11px; color: var(--text2); }
.member-bar-bg { height: 4px; background: var(--bg3); border-radius: 2px; margin-top: 8px; width: 100%; }
.member-bar { height: 100%; border-radius: 2px; }
.invite-section { margin-top: 20px; padding-top: 16px; border-top: 0.5px solid var(--border); }
.invite-row { display: flex; gap: 8px; }
.invite-input { flex: 1; background: var(--bg3); border: 0.5px solid var(--border2); border-radius: 8px; padding: 9px 12px; color: var(--text); font-family: var(--font); font-size: 13px; outline: none; min-width: 0; }
.invite-input:focus { border-color: var(--accent); }
.btn-invite { padding: 9px 16px; background: var(--accent); border: none; border-radius: 8px; color: white; font-family: var(--font); font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; }
.btn-invite:hover { background: var(--accent2); }

/* LEADERBOARD */
.lb-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 0.5px solid var(--border); }
.lb-row:last-child { border-bottom: none; }
.lb-rank { font-family: var(--mono); font-size: 14px; font-weight: 700; width: 28px; text-align: center; flex-shrink: 0; color: var(--text3); }
.lb-rank.gold { color: #ffd700; }
.lb-rank.silver { color: #c0c0c0; }
.lb-rank.bronze { color: #cd7f32; }
.lb-avatar { width: 34px; height: 34px; border-radius: 50%; font-size: 12px; font-weight: 600; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.lb-info { flex: 1; min-width: 0; }
.lb-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.lb-sub { font-size: 11px; color: var(--text2); }
.lb-bar-bg { height: 3px; background: var(--bg3); border-radius: 2px; margin-top: 6px; width: 100%; }
.lb-bar { height: 100%; border-radius: 2px; }
.lb-right { text-align: right; flex-shrink: 0; }
.lb-hrs { font-family: var(--mono); font-size: 14px; font-weight: 700; }
.lb-pct { font-size: 10px; color: var(--text2); }
.lb-me { background: rgba(108,143,255,0.06); border-radius: var(--radius); margin: 0 -6px; padding: 0 6px; }

/* SETTINGS */
.settings-card { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 24px; margin-bottom: 16px; }
.settings-title { font-size: 16px; font-weight: 600; margin-bottom: 20px; }
.goal-picker { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; margin-bottom: 16px; }
.goal-opt { padding: 12px 8px; background: var(--bg3); border: 0.5px solid var(--border); border-radius: 8px; text-align: center; cursor: pointer; transition: all 0.2s; }
.goal-opt.selected { background: rgba(108,143,255,0.15); border-color: var(--accent); color: var(--accent); }
.goal-opt-val { font-family: var(--mono); font-size: 16px; font-weight: 700; }
.goal-opt-lbl { font-size: 9px; color: var(--text3); margin-top: 2px; }
.goal-opt.selected .goal-opt-lbl { color: var(--accent); opacity: 0.7; }
.custom-goal-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.custom-goal-input { width: 80px; background: var(--bg3); border: 0.5px solid var(--border2); border-radius: 8px; padding: 9px 12px; color: var(--text); font-family: var(--mono); font-size: 18px; font-weight: 700; outline: none; text-align: center; }
.custom-goal-input:focus { border-color: var(--accent); }
.btn-save { padding: 10px 20px; background: var(--green); border: none; border-radius: 8px; color: #0a1f14; font-family: var(--font); font-size: 13px; font-weight: 700; cursor: pointer; }
.btn-save:hover { background: var(--green2); }
.reset-day-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin-bottom: 12px; }
.reset-day-opt { padding: 10px 4px; background: var(--bg3); border: 0.5px solid var(--border); border-radius: 8px; text-align: center; cursor: pointer; transition: all 0.2s; font-size: 11px; font-weight: 600; }
.reset-day-opt.selected { background: rgba(167,139,250,0.15); border-color: var(--purple); color: var(--purple); }

/* MODAL */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 16px; }
.modal { background: var(--bg2); border: 0.5px solid var(--border2); border-radius: var(--radius-lg); padding: 28px; width: 100%; max-width: 340px; }
.modal-title { font-size: 16px; font-weight: 700; margin-bottom: 20px; }
.modal-btns { display: flex; gap: 8px; margin-top: 20px; }
.btn-cancel { flex: 1; padding: 10px; background: var(--bg3); border: 0.5px solid var(--border2); border-radius: 8px; color: var(--text2); cursor: pointer; font-family: var(--font); font-size: 13px; }
.btn-confirm { flex: 1; padding: 10px; background: var(--accent); border: none; border-radius: 8px; color: white; cursor: pointer; font-family: var(--font); font-size: 13px; font-weight: 600; }

/* COLOR SWATCH */
.color-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
.color-swatch { width: 28px; height: 28px; border-radius: 50%; cursor: pointer; border: 2.5px solid transparent; transition: all 0.15s; }
.color-swatch.selected { border-color: white; transform: scale(1.15); }

/* NOTIF */
.notif { position: fixed; bottom: 20px; right: 20px; background: var(--bg3); border: 0.5px solid var(--green); border-radius: 8px; padding: 10px 16px; font-size: 13px; color: var(--green); z-index: 200; animation: slideIn 0.3s ease; max-width: 300px; }
.notif.err { border-color: var(--red); color: var(--red); }
@keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

/* MISC */
.pill { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; margin-left: 6px; }
.pill-green { background: rgba(62,207,142,0.15); color: var(--green); }
.pill-amber { background: rgba(245,166,35,0.15); color: var(--amber); }
.pill-red { background: rgba(239,68,68,0.15); color: var(--red); }
.msg { font-size: 12px; color: var(--green); margin-top: 8px; min-height: 18px; }
.empty { text-align: center; color: var(--text3); font-size: 13px; padding: 28px; line-height: 2; }
.btn-danger { padding: 8px 14px; background: transparent; border: 0.5px solid rgba(239,68,68,0.4); border-radius: 8px; color: var(--red); cursor: pointer; font-family: var(--font); font-size: 12px; transition: all 0.2s; }
.btn-danger:hover { background: rgba(239,68,68,0.1); }
.divider { border: none; border-top: 0.5px solid var(--border); margin: 16px 0; }

/* HISTORY FILTERS */
.filter-row { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.filter-chip { padding: 5px 12px; background: var(--bg3); border: 0.5px solid var(--border); border-radius: 20px; font-size: 12px; color: var(--text2); cursor: pointer; transition: all 0.2s; white-space: nowrap; }
.filter-chip.active { background: rgba(108,143,255,0.15); border-color: var(--accent); color: var(--accent); font-weight: 600; }
.filter-chip:hover:not(.active) { border-color: var(--border2); color: var(--text); }

@media (max-width: 540px) {
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
  .nav-name { display: none; }
  .goal-picker { grid-template-columns: repeat(3, 1fr); }
  .reset-day-grid { grid-template-columns: repeat(4, 1fr); }
  .timer-display { font-size: 34px; }
  .subjects-grid { grid-template-columns: repeat(2, 1fr); }
}
</style>

<body>
<div id="loading-overlay" class="loading-overlay">
  <div class="loading-logo">StudySync</div>
  <div class="loading-spinner"></div>
</div>
<div class="app" id="app"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, set, get, onValue, remove, update, serverTimestamp }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

// ─────────────────────────────────────────────────────────────
// 🔥 FIREBASE CONFIG — replace with your own project config
// Get it from: https://console.firebase.google.com → Project Settings → Web App
// ─────────────────────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyDfCTOG4MTzfjupIxF7gTX_NZi4Ed5tUFA",
  authDomain: "study-challenge-bfb13.firebaseapp.com",
  projectId: "study-challenge-bfb13",
  storageBucket: "study-challenge-bfb13.firebasestorage.app",
  messagingSenderId: "490433600085",
  appId: "1:490433600085:web:d46374a513897518ddd2dc",
  measurementId: "G-XNGB09FWWK"
};

let db, firebaseReady = false;
try {
  const fbApp = initializeApp(firebaseConfig);
  db = getDatabase(fbApp);
  firebaseReady = true;
} catch(e) { console.warn('Firebase not configured — offline mode'); }

// ─── CONSTANTS ───
const COLORS_GRAD = [
  'linear-gradient(135deg,#6c8fff,#a78bfa)',
  'linear-gradient(135deg,#3ecf8e,#2a8fff)',
  'linear-gradient(135deg,#f5a623,#ef4444)',
  'linear-gradient(135deg,#a78bfa,#f06)',
  'linear-gradient(135deg,#3ecf8e,#a78bfa)',
  'linear-gradient(135deg,#6c8fff,#3ecf8e)'
];
const SUBJECT_COLORS = [
  '#6c8fff','#3ecf8e','#f5a623','#a78bfa','#ef4444','#06b6d4',
  '#f472b6','#84cc16','#fb923c','#e879f9','#34d399','#60a5fa'
];
const DAYS_SHORT = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const DAYS_FULL  = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

function getGrad(name) { let h=0; for(let c of (name||'')) h=(h*31+c.charCodeAt(0))%COLORS_GRAD.length; return COLORS_GRAD[h]; }
function getInitials(name) { return (name||'?').slice(0,2).toUpperCase(); }
function fmtHrs(h) {
  if (!h || h < 0) return '0h';
  if (h < 1/60) return '0m';
  if (h < 1) return Math.round(h*60)+'m';
  const hrs = Math.floor(h), mins = Math.round((h-hrs)*60);
  return mins ? hrs+'h '+mins+'m' : hrs+'h';
}
function fmtTimer(s) {
  const h=Math.floor(s/3600), m=Math.floor((s%3600)/60), sec=s%60;
  if(h>0) return [h,m,sec].map(x=>String(x).padStart(2,'0')).join(':');
  return [m,sec].map(x=>String(x).padStart(2,'0')).join(':');
}
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function dayKey(offset=0) { const d=new Date(); d.setDate(d.getDate()-offset); return d.toISOString().slice(0,10); }

// ─── STORAGE ───
const LS = {
  get: k => { try { return JSON.parse(localStorage.getItem('ss2_'+k)); } catch(e) { return null; } },
  set: (k,v) => { try { localStorage.setItem('ss2_'+k, JSON.stringify(v)); } catch(e) {} }
};

// ─── STATE ───
let state = {
  user: null, tab: 'dashboard', roomView: null, showCreateRoom: false,
  showAddSubject: false, historyFilter: 'all', lbMode: 'total',
  timer: {
    running: false, paused: false,
    elapsed: 0,           // total elapsed seconds (includes paused segments)
    startTs: null,        // real timestamp when last resumed
    pausedElapsed: 0,     // elapsed accumulated before this run segment
    interval: null,
    subject: null, label: ''
  },
  users: {}, rooms: {}, sessions: {},
  syncListeners: [], syncConnected: false,
};

// ─── PERIOD SYSTEM ───
// periodMode: 'week' | 'month' | 'custom'
// periodDays: number (used when mode=custom, or derived for week/month)
// resetDay: 0-6 (only used when mode='week')

function getUserPeriod(username) {
  const u = state.users[username || state.user] || {};
  return {
    mode:      u.periodMode  || 'week',
    days:      u.periodDays  || 7,
    resetDay:  u.resetDay    !== undefined ? u.resetDay : 1,
  };
}

// Returns an ISO date string for the START of the current period
function periodStartKey(username) {
  const { mode, days, resetDay } = getUserPeriod(username);
  const now = new Date();
  now.setHours(0,0,0,0);

  if (mode === 'week') {
    const dow  = now.getDay();
    const diff = (dow - resetDay + 7) % 7;
    const ws   = new Date(now); ws.setDate(now.getDate() - diff);
    return ws.toISOString().slice(0,10);
  }
  if (mode === 'month') {
    // calendar month: 1st of current month
    return new Date(now.getFullYear(), now.getMonth(), 1).toISOString().slice(0,10);
  }
  // custom N days: rolling window starting N days ago
  const ws = new Date(now); ws.setDate(now.getDate() - (days - 1));
  return ws.toISOString().slice(0,10);
}

// Human-readable period label
function periodLabel(username) {
  const { mode, days, resetDay } = getUserPeriod(username);
  if (mode === 'week')   return `Resets every ${DAYS_FULL[resetDay]}`;
  if (mode === 'month')  return 'Resets 1st of each month';
  return `Rolling ${days}-day window`;
}

function periodShortLabel(username) {
  const { mode, days } = getUserPeriod(username);
  if (mode === 'week')   return 'This week';
  if (mode === 'month')  return 'This month';
  return `Last ${days} days`;
}

// Legacy alias — still used internally for session tagging
function getResetDay(username) {
  return getUserPeriod(username).resetDay;
}
function weekKey(resetDay) {
  // kept for session write compat; just returns period start
  return periodStartKey(state.user);
}

// ─── HOURS CALCS ───
function getUserPeriodHours(username) {
  const start = periodStartKey(username);
  const us = state.sessions[username]; if (!us) return 0;
  let t = 0;
  Object.values(us).forEach(s => {
    // Support both week-tagged sessions and day-tagged sessions
    const inPeriod = s.week === start || (s.day && s.day >= start);
    if (inPeriod) t += s.duration;
  });
  return Math.round(t * 10) / 10;
}
// alias used throughout
function getUserWeekHours(username) { return getUserPeriodHours(username); }

function getUserSubjectHours(username, subjectId) {
  const start = periodStartKey(username);
  const us = state.sessions[username]; if (!us) return 0;
  let t = 0;
  Object.values(us).forEach(s => {
    const inPeriod = s.week === start || (s.day && s.day >= start);
    if (inPeriod && s.subjectId === subjectId) t += s.duration;
  });
  return Math.round(t * 10) / 10;
}

// All-time total hours (for leaderboard)
function getUserTotalHours(username) {
  const us = state.sessions[username]; if (!us) return 0;
  let t = 0;
  Object.values(us).forEach(s => { t += s.duration; });
  return Math.round(t * 10) / 10;
}
function getUserDayHours(username, dayOffset) {
  const dk = dayKey(dayOffset);
  const us = state.sessions[username]; if (!us) return 0;
  let t = 0;
  Object.values(us).forEach(s => { if(s.day===dk) t+=s.duration; });
  return Math.round(t*10)/10;
}
function getUserDailyGoal(username) {
  const u = state.users[username];
  if (!u) return null;
  if (u.dailyGoal !== undefined) return u.dailyGoal;
  const { mode, days } = getUserPeriod(username);
  const periodLen = mode === 'month' ? 30 : days;
  return Math.round((u.goal || 40) / periodLen * 10) / 10;
}
function getSubjects(username) {
  const u = state.users[username]; if (!u) return [];
  return u.subjects || [];
}

// ─── FIREBASE ───
async function fbGet(path) {
  if (!firebaseReady) return null;
  try { const s=await get(ref(db,path)); return s.exists()?s.val():null; } catch(e){ return null; }
}
async function fbSet(path, val) {
  if (!firebaseReady) return false;
  try { await set(ref(db,path),val); return true; } catch(e){ return false; }
}
async function fbUpdate(path, val) {
  if (!firebaseReady) return false;
  try { await update(ref(db,path),val); return true; } catch(e){ return false; }
}
async function fbRemove(path) {
  if (!firebaseReady) return false;
  try { await remove(ref(db,path)); return true; } catch(e){ return false; }
}
function fbListen(path, cb) {
  if (!firebaseReady) return ()=>{};
  const r = ref(db,path);
  const unsub = onValue(r, snap => cb(snap.exists()?snap.val():null));
  state.syncListeners.push(unsub);
  return unsub;
}
function stopAllListeners() {
  state.syncListeners.forEach(u=>{ try{u()}catch(e){} });
  state.syncListeners = [];
}

// ─── SYNC ───
function startSync() {
  stopAllListeners();
  if (firebaseReady) {
    fbListen('.info/connected', c => {
      state.syncConnected = !!c;
      const dot = document.querySelector('.sync-dot');
      if (dot) dot.className = 'sync-dot'+(c?' live':'');
    });
  }
  fbListen('users', data => {
    state.users = data || LS.get('users') || {};
    refreshView();
  });
  fbListen('rooms', data => { state.rooms = data||{}; refreshView(); });
  fbListen('sessions', data => { state.sessions = data||{}; refreshView(); });
}

function refreshView() {
  if (!state.user) return;
  renderMain();
}

// ─── SESSION LOG ───
async function logSession(username, duration, label, subjectId) {
  const periodStart = periodStartKey(username);
  const entry = { duration, label, subjectId: subjectId||null, week: periodStart, day: dayKey(), ts: Date.now() };
  const key = 'sess_' + Date.now() + '_' + Math.random().toString(36).slice(2,5);
  const ok = await fbSet(`sessions/${username}/${key}`, entry);
  if (!ok) {
    const s = LS.get('sessions')||{};
    if (!s[username]) s[username]={};
    s[username][key]=entry; LS.set('sessions',s);
  }
  if (!state.sessions[username]) state.sessions[username]={};
  state.sessions[username][key]=entry;
}

// ─── AUTH ───
async function login(username, password) {
  let user = await fbGet(`users/${username}`);
  if (!user) { const l=LS.get('users')||{}; user=l[username]; }
  if (!user) return { ok:false, err:'User not found.' };
  if (user.password !== password) return { ok:false, err:'Wrong password.' };
  return { ok:true, user };
}
async function signup(username, displayName, password, goal, resetDay) {
  let ex = await fbGet(`users/${username}`);
  if (!ex) { const l=LS.get('users')||{}; ex=l[username]; }
  if (ex) return { ok:false, err:'Username already taken.' };
  const user = { username, displayName, password, goal:goal||40, resetDay:resetDay!==undefined?resetDay:1, periodMode:'week', periodDays:7, dailyGoal:null, subjects:[], createdAt:Date.now() };
  const ok = await fbSet(`users/${username}`, user);
  if (!ok) { const l=LS.get('users')||{}; l[username]=user; LS.set('users',l); }
  return { ok:true, user };
}

// ─── RENDER ───
function render() {
  const app = document.getElementById('app');
  if (!state.user) renderAuth(app); else renderMain();
}

function renderMain() {
  const app = document.getElementById('app');
  if (!state.user) return;
  let html = renderNav() + '<div class="content">';
  if      (state.tab==='dashboard') html += renderDashboard();
  else if (state.tab==='rooms')     html += renderRooms();
  else if (state.tab==='leaderboard') html += renderLeaderboard();
  else if (state.tab==='history')   html += renderHistory();
  else if (state.tab==='settings')  html += renderSettings();
  html += '</div>';
  if (state.showCreateRoom)  html += renderCreateRoomModal();
  if (state.showAddSubject)  html += renderAddSubjectModal();
  app.innerHTML = html;
  bindEvents();
}

// ─── AUTH UI ───
function renderAuth(app) {
  app.innerHTML = `
  <div class="auth-screen">
    <div class="auth-logo">StudySync</div>
    <div class="auth-tagline">Study together. Stay accountable.</div>
    <div class="auth-card">
      <div class="auth-tabs">
        <div class="auth-tab active" id="tab-login">Sign in</div>
        <div class="auth-tab" id="tab-signup">Sign up</div>
      </div>
      <div id="auth-form"></div>
    </div>
  </div>`;
  renderAuthForm('login');
  document.getElementById('tab-login').onclick = () => {
    document.getElementById('tab-login').classList.add('active');
    document.getElementById('tab-signup').classList.remove('active');
    renderAuthForm('login');
  };
  document.getElementById('tab-signup').onclick = () => {
    document.getElementById('tab-signup').classList.add('active');
    document.getElementById('tab-login').classList.remove('active');
    renderAuthForm('signup');
  };
}

function renderAuthForm(mode) {
  const f = document.getElementById('auth-form');
  if (mode==='login') {
    f.innerHTML = `
      <div class="field-group"><div class="field-label">Username</div><input class="field-input" id="fi-user" placeholder="your username" autocomplete="username"></div>
      <div class="field-group"><div class="field-label">Password</div><input class="field-input" id="fi-pass" type="password" placeholder="••••••••" autocomplete="current-password"></div>
      <button class="btn-primary" id="btn-auth">Sign in</button>
      <div class="auth-err" id="auth-err"></div>`;
    const doLogin = async () => {
      const btn=document.getElementById('btn-auth'); btn.textContent='Signing in…'; btn.disabled=true;
      const u=document.getElementById('fi-user').value.trim().toLowerCase();
      const p=document.getElementById('fi-pass').value;
      const res=await login(u,p);
      if (!res.ok) { document.getElementById('auth-err').textContent=res.err; btn.textContent='Sign in'; btn.disabled=false; return; }
      state.user=u; LS.set('session',u); startSync(); render();
    };
    document.getElementById('btn-auth').onclick = doLogin;
    document.getElementById('fi-pass').addEventListener('keydown',e=>{ if(e.key==='Enter') doLogin(); });
  } else {
    const dayOpts = DAYS_FULL.map((d,i)=>`<option value="${i}" ${i===1?'selected':''}>${d}</option>`).join('');
    f.innerHTML = `
      <div class="field-group"><div class="field-label">Display name</div><input class="field-input" id="fi-dname" placeholder="e.g. Beshoy"></div>
      <div class="field-group"><div class="field-label">Username</div><input class="field-input" id="fi-user" placeholder="lowercase, no spaces"></div>
      <div class="field-group"><div class="field-label">Password</div><input class="field-input" id="fi-pass" type="password" placeholder="••••••••"></div>
      <div class="field-group"><div class="field-label">Weekly goal (hours)</div><input class="field-input" id="fi-goal" type="number" placeholder="e.g. 40" min="1" max="168"></div>
      <div class="field-group"><div class="field-label">Week resets every</div><select class="field-input" id="fi-reset">${dayOpts}</select></div>
      <button class="btn-primary" id="btn-auth">Create account</button>
      <div class="auth-err" id="auth-err"></div>`;
    document.getElementById('btn-auth').onclick = async () => {
      const btn=document.getElementById('btn-auth'); btn.textContent='Creating…'; btn.disabled=true;
      const dn=document.getElementById('fi-dname').value.trim();
      const u=document.getElementById('fi-user').value.trim().toLowerCase().replace(/\s+/g,'');
      const p=document.getElementById('fi-pass').value;
      const g=parseInt(document.getElementById('fi-goal').value)||40;
      const rd=parseInt(document.getElementById('fi-reset').value);
      const err=document.getElementById('auth-err');
      if (!dn||!u||!p) { err.textContent='Please fill all fields.'; btn.textContent='Create account'; btn.disabled=false; return; }
      if (u.length<3) { err.textContent='Username must be ≥ 3 chars.'; btn.textContent='Create account'; btn.disabled=false; return; }
      const res=await signup(u,dn,p,g,rd);
      if (!res.ok) { err.textContent=res.err; btn.textContent='Create account'; btn.disabled=false; return; }
      state.user=u; state.users[u]=res.user; LS.set('session',u); startSync(); render();
    };
  }
}

// ─── NAV ───
function renderNav() {
  const u = state.users[state.user]||{};
  const syncDot = firebaseReady
    ? `<div class="sync-dot ${state.syncConnected?'live':''}" title="${state.syncConnected?'Live sync':'Connecting…'}"></div>` : '';
  const tabs = [
    ['dashboard','Dashboard'],['rooms','Rooms'],['leaderboard','🏆 Leaderboard'],
    ['history','History'],['settings','Settings']
  ];
  const tabsHtml = tabs.map(([id,lbl])=>
    `<div class="nav-tab ${state.tab===id?'active':''}" onclick="goTab('${id}')">${lbl}</div>`
  ).join('');
  return `<div class="nav">
    <div class="nav-logo">StudySync</div>
    <div class="nav-tabs">${tabsHtml}</div>
    <div class="nav-user">
      ${syncDot}
      <div class="nav-avatar" style="background:${getGrad(state.user)}">${getInitials(u.displayName)}</div>
      <div class="nav-name">${esc(u.displayName||state.user)}</div>
      <button class="btn-logout" onclick="logout()">Sign out</button>
    </div>
  </div>`;
}

// ─── DASHBOARD ───
function renderDashboard() {
  const u = state.users[state.user]||{};
  const weekHrs = getUserWeekHours(state.user);
  const goal = u.goal||40;
  const resetDay = getResetDay();
  const pct = Math.min(100, Math.round(weekHrs/goal*100));
  const remaining = Math.max(0, goal-weekHrs);
  const barColor = pct>=100?'#3ecf8e':pct>=60?'#6c8fff':pct>=30?'#f5a623':'#ef4444';
  const statusPill = pct>=100?'<span class="pill pill-green">🎉 Goal reached!</span>'
    :pct>=60?'<span class="pill pill-green">On track</span>'
    :pct>=30?'<span class="pill pill-amber">Keep going</span>'
    :'<span class="pill pill-red">Needs effort</span>';

  // Daily goal
  const dailyGoal = getUserDailyGoal(state.user);
  const todayHrs = getUserDayHours(state.user, 0);
  const dailyPct = Math.min(100, Math.round(todayHrs/dailyGoal*100));
  const dailyColor = dailyPct>=100?'#3ecf8e':dailyPct>=60?'#6c8fff':dailyPct>=30?'#f5a623':'#ef4444';

  // Day chart
  const today = new Date(), dow = today.getDay();
  const diffFromReset = (dow-resetDay+7)%7;
  const dayLabels=[], dayHrs=[];
  for (let i=diffFromReset;i>=0;i--) {
    const d=new Date(today); d.setDate(today.getDate()-i);
    dayLabels.push(DAYS_SHORT[d.getDay()]);
    dayHrs.push(getUserDayHours(state.user,i));
  }
  const maxDay = Math.max(...dayHrs,0.01);
  const dayBars = dayLabels.map((lbl,i)=>{
    const isToday=i===dayLabels.length-1, h=dayHrs[i];
    const hp=Math.round(h/maxDay*100);
    return `<div class="day-bar-wrap">
      <div class="day-hrs-lbl">${h>0?fmtHrs(h):''}</div>
      <div class="day-bar-bg"><div class="day-bar" style="height:${hp}%;background:${isToday?'#6c8fff':'#3ecf8e'};opacity:${isToday?1:0.55}"></div></div>
      <div class="day-lbl" style="color:${isToday?'#6c8fff':''};font-weight:${isToday?700:400}">${lbl}</div>
    </div>`;
  }).join('');

  // Timer state
  const tr=state.timer.running, tp=state.timer.paused;
  const timerColor = tr&&!tp?'#3ecf8e':tp?'#f5a623':'#e8eaf0';
  const elapsed = getTimerElapsed();

  // Subjects
  const subjects = getSubjects(state.user);
  let subjectsHtml = '';
  if (subjects.length > 0) {
    const subCards = subjects.map(sub=>{
      const sh = getUserSubjectHours(state.user, sub.id);
      const spct = weekHrs>0 ? Math.round(sh/weekHrs*100) : 0;
      const isActive = state.timer.subject===sub.id;
      return `<div class="subject-card ${isActive?'active-subject':''}" onclick="selectSubject('${sub.id}')">
        <button class="subject-del" onclick="event.stopPropagation();deleteSubject('${sub.id}')" title="Remove">×</button>
        <div class="subject-name"><span class="subject-dot" style="background:${sub.color}"></span>${esc(sub.name)}</div>
        <div class="subject-hrs" style="color:${sub.color}">${fmtHrs(sh)}</div>
        <div class="subject-pct">${spct}% of week</div>
        <div class="subject-bar-bg"><div class="subject-bar" style="width:${spct}%;background:${sub.color}"></div></div>
      </div>`;
    }).join('');
    subjectsHtml = `
      <div class="subjects-section">
        <div class="section-title">Subjects — click to select for timer</div>
        <div class="subjects-grid">${subCards}</div>
        <button class="btn-add-subject" onclick="window.showAddSubject()">+ Add subject</button>
      </div>`;
  } else {
    subjectsHtml = `
      <div class="subjects-section">
        <div class="section-title">Subjects</div>
        <button class="btn-add-subject" onclick="window.showAddSubject()">+ Add your first subject</button>
      </div>`;
  }

  // Subject select for timer
  const subjectOpts = subjects.length>0
    ? `<select class="timer-subject-select" id="timer-subject" onchange="window.setTimerSubject(this.value)">
        <option value="">No subject</option>
        ${subjects.map(s=>`<option value="${s.id}" ${state.timer.subject===s.id?'selected':''}>${esc(s.name)}</option>`).join('')}
       </select>` : '';

  const selectedSub = subjects.find(s=>s.id===state.timer.subject);

  // Recent sessions (last 4)
  const us = state.sessions[state.user]||{};
  const sessArr = Object.values(us).sort((a,b)=>b.ts-a.ts).slice(0,4);
  let sessionLog = sessArr.length===0
    ? '<div class="empty">No sessions yet.<br>Start the timer to track your study time!</div>'
    : sessArr.map(s=>{
        const d=new Date(s.ts), sub=getSubjects(state.user).find(x=>x.id===s.subjectId);
        const tag=sub?`<span class="session-subject-tag" style="background:${sub.color}22;color:${sub.color}">${esc(sub.name)}</span>`:'';
        return `<div class="session-item">
          <div class="session-dot" style="background:${sub?sub.color:'#6c8fff'}"></div>
          <div class="session-info">
            <div class="session-lbl">${esc(s.label||'Study session')}${tag}</div>
            <div class="session-meta">${d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})} · ${d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})}</div>
          </div>
          <div class="session-time" style="color:${sub?sub.color:'#3ecf8e'}">+${fmtHrs(s.duration)}</div>
        </div>`;
      }).join('');

  return `
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-val" style="color:#6c8fff">${fmtHrs(weekHrs)}</div><div class="stat-lbl">${periodShortLabel(state.user)}</div><div class="stat-sub">Goal: ${goal}h</div></div>
    <div class="stat-card"><div class="stat-val" style="color:${pct>=100?'#3ecf8e':'#f5a623'}">${pct}%</div><div class="stat-lbl">Progress</div><div class="stat-sub">${statusPill}</div></div>
    <div class="stat-card"><div class="stat-val" style="color:#a78bfa">${remaining>0?fmtHrs(remaining):'—'}</div><div class="stat-lbl">Remaining</div><div class="stat-sub">${remaining>0?'to reach goal':'Goal complete!'}</div></div>
  </div>

  <div class="goal-bar-wrap">
    <div class="section-title">${periodShortLabel(state.user)} goal <span class="live-badge"><span class="live-dot"></span>LIVE</span></div>
    <div class="goal-bar-bg"><div class="goal-bar-fill" style="width:${pct}%;background:${barColor}"></div></div>
    <div class="goal-info"><span>${fmtHrs(weekHrs)} studied</span><span>${goal}h goal · ${periodLabel(state.user)}</span></div>
  </div>

  <div class="daily-card">
    <div class="daily-info">
      <div class="daily-title">Today's goal</div>
      <div class="daily-val" style="color:${dailyColor}">${fmtHrs(todayHrs)} <span style="font-size:14px;color:var(--text2)">/ ${fmtHrs(dailyGoal)}</span></div>
      <div class="daily-bar-bg"><div class="daily-bar" style="width:${dailyPct}%;background:${dailyColor}"></div></div>
    </div>
    <div class="daily-edit">
      <input class="daily-input" id="daily-goal-inp" type="number" value="${dailyGoal}" min="0.5" max="24" step="0.5">
      <span style="font-size:12px;color:var(--text2)">h/day</span>
      <button class="btn-sm" onclick="window.saveDailyGoal()">Save</button>
    </div>
  </div>

  <div class="chart-card">
    <div class="section-title">This week by day</div>
    <div class="week-chart">${dayBars}</div>
  </div>

  ${subjectsHtml}

  <div class="timer-card">
    <div class="timer-top">
      <div class="timer-left">
        <div class="timer-display" id="timer-display" style="color:${timerColor}">${fmtTimer(elapsed)}</div>
        <div class="timer-status" id="timer-status">${tr&&!tp?'Session in progress…':tp?'⏸ Paused':'Ready to study?'}</div>
        <div class="timer-meta">
          ${subjectOpts}
          <input class="timer-label-inp" id="session-label" placeholder="${selectedSub?'e.g. Chapter 5':'What are you studying?'}" value="${esc(state.timer.label)}">
        </div>
      </div>
      <div class="timer-btns">
        ${!tr
          ? `<button class="btn-timer btn-start" onclick="window.startTimer()">▶ Start</button>`
          : tp
            ? `<button class="btn-timer btn-start" onclick="window.resumeTimer()">▶ Resume</button>
               <button class="btn-timer btn-stop" onclick="window.stopTimer()">■ Save</button>`
            : `<button class="btn-timer btn-pause" onclick="window.pauseTimer()">⏸ Pause</button>
               <button class="btn-timer btn-stop" onclick="window.stopTimer()">■ Save</button>`
        }
      </div>
    </div>
  </div>

  <div class="section-title">Recent sessions <a href="#" onclick="event.preventDefault();window.goTab('history')" style="text-decoration:none;font-size:10px;color:var(--accent);margin-left:8px;letter-spacing:0;text-transform:none;font-weight:500">View all →</a></div>
  <div class="session-log-wrap">${sessionLog}</div>`;
}

// ─── ROOMS ───
function renderRooms() {
  if (state.roomView) return renderRoomDetail(state.roomView);
  const myRooms = Object.values(state.rooms).filter(r=>r.owner===state.user||(r.members||[]).includes(state.user));
  let cards = myRooms.map(r=>{
    const isOwner=r.owner===state.user, allM=[r.owner,...(r.members||[])];
    let avs=allM.slice(0,5).map(m=>{const u2=state.users[m];return`<div class="mini-avatar" style="background:${getGrad(m)}">${getInitials(u2?u2.displayName:m)}</div>`;}).join('');
    return `<div class="room-card ${isOwner?'mine':''}" onclick="openRoom('${esc(r.id)}')">
      <div class="room-badge ${isOwner?'badge-owner':'badge-member'}">${isOwner?'OWNER':'MEMBER'}</div>
      <div class="room-name">${esc(r.name)}</div>
      <div class="room-meta">${allM.length} member${allM.length!==1?'s':''}</div>
      <div class="room-members">${avs}</div>
    </div>`;
  }).join('');
  if (!myRooms.length) cards='<div style="grid-column:1/-1"><div class="empty">No rooms yet.<br>Create one or ask a friend to invite you!</div></div>';
  return `
  <div class="section-title">Your rooms <span class="live-badge"><span class="live-dot"></span>LIVE</span></div>
  <div class="rooms-grid">${cards}</div>
  <button class="btn-create-room" onclick="window.showCreateRoom()">+ Create new room</button>`;
}

function renderRoomDetail(roomId) {
  const room=state.rooms[roomId]; if (!room) return '<div class="empty">Room not found.</div>';
  const allM=[room.owner,...(room.members||[])], isOwner=room.owner===state.user;
  const sorted=allM.slice().sort((a,b)=>getUserWeekHours(b)-getUserWeekHours(a));
  const maxHrs=Math.max(...sorted.map(m=>getUserWeekHours(m)),0.01);
  let rows=sorted.map((m,idx)=>{
    const u2=state.users[m]; if (!u2) return '';
    const wh=getUserWeekHours(m), g=u2.goal||40, pct=Math.min(100,Math.round(wh/g*100));
    const bc=pct>=100?'#3ecf8e':pct>=60?'#6c8fff':pct>=30?'#f5a623':'#ef4444';
    const isMe=m===state.user;
    const rank=idx===0?'🥇':idx===1?'🥈':idx===2?'🥉':'';
    return `<div class="member-row ${isMe?'lb-me':''}">
      <div class="member-avatar" style="background:${getGrad(m)}">${getInitials(u2.displayName)}</div>
      <div class="member-info">
        <div class="member-name">${rank} ${esc(u2.displayName)}${isMe?' <span style="color:var(--text3);font-size:10px">(you)</span>':''}${m===room.owner?' 👑':''}</div>
        <div class="member-goal-lbl">Goal: ${g}h · Resets ${DAYS_FULL[u2.resetDay||1]}</div>
        <div class="member-bar-bg"><div class="member-bar" style="width:${pct}%;background:${bc}"></div></div>
      </div>
      <div class="member-progress"><div class="member-hrs" style="color:${bc}">${fmtHrs(wh)}</div><div class="member-pct">${pct}%</div></div>
    </div>`;
  }).join('');
  const inv=isOwner?`<div class="invite-section">
    <div class="section-title" style="margin-bottom:10px">Invite a member</div>
    <div class="invite-row"><input class="invite-input" id="invite-user" placeholder="Enter username…"><button class="btn-invite" onclick="window.inviteUser('${roomId}')">Invite</button></div>
    <div id="invite-msg" style="font-size:12px;margin-top:8px;"></div>
  </div>`:
  `<div style="font-size:12px;color:var(--text3);margin-top:16px;padding-top:12px;border-top:0.5px solid var(--border)">Ask the owner to invite more members.</div>`;
  const leaveBtn=!isOwner
    ?`<button class="btn-cancel" style="margin-top:12px;width:100%;padding:10px;background:var(--bg3);border:0.5px solid var(--border2);border-radius:8px;color:var(--text2);cursor:pointer;font-family:var(--font);font-size:13px" onclick="window.leaveRoom('${roomId}')">Leave room</button>`
    :`<button class="btn-danger" style="margin-top:12px" onclick="window.deleteRoom('${roomId}')">Delete room</button>`;
  return `<div class="room-detail">
    <div class="room-detail-header">
      <div><div class="room-detail-title">${esc(room.name)} <span class="live-badge"><span class="live-dot"></span>LIVE</span></div>
      <div style="font-size:12px;color:var(--text2)">${allM.length} member${allM.length!==1?'s':''} · Period leaderboard</div></div>
      <button class="btn-back" onclick="window.closeRoom()">← Back</button>
    </div>
    ${rows}${inv}${leaveBtn}
  </div>`;
}

// ─── LEADERBOARD ───
function renderLeaderboard() {
  const allUsers = Object.values(state.users);
  if (allUsers.length === 0) return '<div class="empty">No users yet.</div>';
  const lbMode = state.lbMode || 'total'; // 'total' | 'period'

  const ranked = allUsers.map(u => {
    const totalHrs  = getUserTotalHours(u.username);
    const periodHrs = getUserPeriodHours(u.username);
    const sortHrs   = lbMode === 'total' ? totalHrs : periodHrs;
    const g = u.goal || 40;
    return { ...u, totalHrs, periodHrs, sortHrs, pct: Math.round(periodHrs / g * 100) };
  }).sort((a, b) => b.sortHrs - a.sortHrs);

  const maxHrs = Math.max(...ranked.map(r => r.sortHrs), 0.01);
  const myData = ranked.find(u => u.username === state.user);
  const myRank = ranked.findIndex(u => u.username === state.user) + 1;

  let rows = ranked.map((u, idx) => {
    const isMe = u.username === state.user;
    const displayHrs = lbMode === 'total' ? u.totalHrs : u.periodHrs;
    const bc = u.pct >= 100 ? '#3ecf8e' : u.pct >= 60 ? '#6c8fff' : u.pct >= 30 ? '#f5a623' : '#ef4444';
    const barColor = lbMode === 'total' ? '#6c8fff' : bc;
    const rankClass = idx === 0 ? 'gold' : idx === 1 ? 'silver' : idx === 2 ? 'bronze' : '';
    const rankLabel = idx === 0 ? '🥇' : idx === 1 ? '🥈' : idx === 2 ? '🥉' : `#${idx + 1}`;
    const barW = Math.round(displayHrs / maxHrs * 100);
    const sub = lbMode === 'total'
      ? `All time · ${periodShortLabel(u.username)}: ${fmtHrs(u.periodHrs)}`
      : `Goal: ${u.goal || 40}h · ${periodShortLabel(u.username)}`;
    return `<div class="lb-row ${isMe ? 'lb-me' : ''}">
      <div class="lb-rank ${rankClass}">${rankLabel}</div>
      <div class="lb-avatar" style="background:${getGrad(u.username)}">${getInitials(u.displayName)}</div>
      <div class="lb-info">
        <div class="lb-name">${esc(u.displayName)}${isMe ? ' <span style="color:var(--text3);font-size:10px">(you)</span>' : ''}</div>
        <div class="lb-sub">${sub}</div>
        <div class="lb-bar-bg"><div class="lb-bar" style="width:${barW}%;background:${barColor}"></div></div>
      </div>
      <div class="lb-right">
        <div class="lb-hrs" style="color:${barColor}">${fmtHrs(displayHrs)}</div>
        <div class="lb-pct">${lbMode === 'total' ? 'total' : u.pct + '%'}</div>
      </div>
    </div>`;
  }).join('');

  const myPeriodHrs = myData ? myData.periodHrs : 0;
  const myTotalHrs  = myData ? myData.totalHrs  : 0;

  return `
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px">
    <div class="section-title" style="margin-bottom:0">Global leaderboard <span class="live-badge"><span class="live-dot"></span>LIVE</span></div>
    <div style="display:flex;gap:4px;background:var(--bg3);border-radius:8px;padding:3px">
      <div style="padding:5px 14px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;${lbMode==='total'?'background:var(--bg4);color:var(--text)':'color:var(--text2)'}" onclick="window.setLbMode('total')">All time</div>
      <div style="padding:5px 14px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;${lbMode==='period'?'background:var(--bg4);color:var(--text)':'color:var(--text2)'}" onclick="window.setLbMode('period')">This period</div>
    </div>
  </div>
  <div class="stats-grid" style="margin-bottom:20px">
    <div class="stat-card"><div class="stat-val" style="color:#ffd700">#${myRank}</div><div class="stat-lbl">Your rank</div><div class="stat-sub">of ${ranked.length} users</div></div>
    <div class="stat-card"><div class="stat-val" style="color:#6c8fff">${fmtHrs(myTotalHrs)}</div><div class="stat-lbl">All-time hours</div><div class="stat-sub">${fmtHrs(myPeriodHrs)} this period</div></div>
    <div class="stat-card"><div class="stat-val" style="color:#3ecf8e">${ranked.length > 0 ? fmtHrs(ranked[0].sortHrs) : '—'}</div><div class="stat-lbl">Top score</div><div class="stat-sub">${ranked.length > 0 ? esc(ranked[0].displayName) : ''}</div></div>
  </div>
  <div class="session-log-wrap">${rows}</div>`;
}

// ─── HISTORY ───
function renderHistory() {
  const us = state.sessions[state.user]||{};
  const subjects = getSubjects(state.user);
  let all = Object.values(us).sort((a,b)=>b.ts-a.ts);

  // Filter chips
  const filters = [['all','All'], ...subjects.map(s=>[s.id,s.name])];
  const filterHtml = filters.map(([id,lbl])=>
    `<div class="filter-chip ${state.historyFilter===id?'active':''}" onclick="window.setHistoryFilter('${id}')">${esc(lbl)}</div>`
  ).join('');

  if (state.historyFilter!=='all') {
    all = all.filter(s=>s.subjectId===state.historyFilter);
  }

  const totalHrs = all.reduce((a,s)=>a+s.duration,0);
  const totalSessions = all.length;
  const avgSession = totalSessions>0 ? totalHrs/totalSessions : 0;

  let rows = all.length===0
    ? '<div class="empty">No sessions yet' + (state.historyFilter!=='all'?' for this subject':'') + '.</div>'
    : all.map(s=>{
        const d=new Date(s.ts), sub=subjects.find(x=>x.id===s.subjectId);
        const tag=sub?`<span class="session-subject-tag" style="background:${sub.color}22;color:${sub.color}">${esc(sub.name)}</span>`:'';
        return `<div class="session-item">
          <div class="session-dot" style="background:${sub?sub.color:'#6c8fff'}"></div>
          <div class="session-info">
            <div class="session-lbl">${esc(s.label||'Study session')}${tag}</div>
            <div class="session-meta">${d.toLocaleDateString('en-US',{weekday:'short',year:'numeric',month:'short',day:'numeric'})} · ${d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})}</div>
          </div>
          <div class="session-time" style="color:${sub?sub.color:'#3ecf8e'}">${fmtHrs(s.duration)}</div>
        </div>`;
      }).join('');

  return `
  <div class="section-title">Study history</div>
  <div class="stats-grid" style="margin-bottom:16px">
    <div class="stat-card"><div class="stat-val" style="color:#6c8fff">${fmtHrs(Math.round(totalHrs*10)/10)}</div><div class="stat-lbl">Total hours</div></div>
    <div class="stat-card"><div class="stat-val" style="color:#a78bfa">${totalSessions}</div><div class="stat-lbl">Sessions</div></div>
    <div class="stat-card"><div class="stat-val" style="color:#3ecf8e">${fmtHrs(Math.round(avgSession*10)/10)}</div><div class="stat-lbl">Avg session</div></div>
  </div>
  <div class="filter-row">${filterHtml}</div>
  <div class="session-log-wrap">${rows}</div>`;
}

        <div style="font-family:var(--mono);font-size:18px;font-weight:700;color:${(state.users[state.user]||{}).periodMode==='custom'&&(state.users[state.user]||{}).periodDays===14?'var(--accent)':'var(--text)'}">14</div>
        <div style="font-size:11px;color:var(--text2);margin-top:2px">days (2 weeks)</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px">
      <span style="font-size:12px;color:var(--text2)">Custom days:</span>
      <input id="custom-period-days" type="number" min="1" max="365" value="${(state.users[state.user]||{}).periodDays||7}" style="width:70px;background:var(--bg3);border:0.5px solid var(--border2);border-radius:7px;padding:7px 8px;color:var(--text);font-family:var(--mono);font-size:16px;font-weight:700;text-align:center;outline:none">
      <button class="btn-sm" onclick="window.saveCustomPeriod()">Set</button>
    </div>
    ${(state.users[state.user]||{}).periodMode==='week' ? `
    <div style="font-size:12px;color:var(--text2);margin-bottom:10px">Which day the week resets:</div>
    <div class="reset-day-grid">${DAYS_SHORT.map((d,i)=>`<div class="reset-day-opt ${resetDay===i?'selected':''}" onclick="window.setResetDay(${i})">${d}</div>`).join('')}</div>
    ` : ''}
    <div style="font-size:12px;color:var(--text3);margin-top:10px;padding:10px;background:var(--bg3);border-radius:8px">
      Current period: <strong style="color:var(--text2)">${periodLabel(state.user)}</strong>
    </div>
    <div id="reset-msg" class="msg"></div>
  </div>
  <div class="settings-card">
    <div class="settings-title">Your subjects</div>
    ${subjectList}
    <button class="btn-add-subject" style="margin-top:12px" onclick="window.showAddSubject()">+ Add subject</button>
  </div>
  <div class="settings-card">
    <div class="settings-title">Your stats this week</div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px">
      <div class="stat-card"><div class="stat-val" style="color:#6c8fff;font-size:20px">${fmtHrs(weekHrs)}</div><div class="stat-lbl">Studied</div></div>
      <div class="stat-card"><div class="stat-val" style="color:#a78bfa;font-size:20px">${goal}h</div><div class="stat-lbl">Goal</div></div>
      <div class="stat-card"><div class="stat-val" style="color:#3ecf8e;font-size:20px">${Math.min(100,Math.round(weekHrs/goal*100))}%</div><div class="stat-lbl">Done</div></div>
    </div>
  </div>`;
}

// ─── MODALS ───
function renderCreateRoomModal() {
  return `<div class="modal-overlay" onclick="if(event.target===this)window.hideCreateRoom()">
    <div class="modal">
      <div class="modal-title">Create a study room</div>
      <div class="field-group"><div class="field-label">Room name</div>
        <input class="field-input" id="room-name-input" placeholder="e.g. A-Level Grind, P4 Squad…" autofocus>
      </div>
      <div class="modal-btns">
        <button class="btn-cancel" onclick="window.hideCreateRoom()">Cancel</button>
        <button class="btn-confirm" onclick="window.createRoom()">Create room</button>
      </div>
    </div>
  </div>`;
}

function renderAddSubjectModal() {
  const swatches = SUBJECT_COLORS.map((c,i)=>
    `<div class="color-swatch ${i===0?'selected':''}" style="background:${c}" data-color="${c}" onclick="selectColor('${c}',this)"></div>`
  ).join('');
  return `<div class="modal-overlay" onclick="if(event.target===this)window.hideAddSubject()">
    <div class="modal">
      <div class="modal-title">Add a subject</div>
      <div class="field-group"><div class="field-label">Subject name</div>
        <input class="field-input" id="subject-name-inp" placeholder="e.g. Pure Maths, Physics…" autofocus>
      </div>
      <div class="field-group">
        <div class="field-label">Color</div>
        <div class="color-row" id="color-swatches">${swatches}</div>
        <input type="hidden" id="subject-color" value="${SUBJECT_COLORS[0]}">
      </div>
      <div class="modal-btns">
        <button class="btn-cancel" onclick="window.hideAddSubject()">Cancel</button>
        <button class="btn-confirm" onclick="window.addSubject()">Add subject</button>
      </div>
    </div>
  </div>`;
}

// ─── TIMER (BACKGROUND-SAFE) ───
// Key insight: store startTs as real Date.now() timestamp.
// When tab resumes, recalculate elapsed from timestamp rather than relying on setInterval.

function getTimerElapsed() {
  if (!state.timer.running) return state.timer.elapsed;
  if (state.timer.paused) return state.timer.elapsed;
  // Running: compute from startTs
  return state.timer.pausedElapsed + Math.floor((Date.now() - state.timer.startTs) / 1000);
}

function saveTimerToStorage() {
  LS.set('timer_state', {
    running: state.timer.running,
    paused: state.timer.paused,
    startTs: state.timer.startTs,
    pausedElapsed: state.timer.pausedElapsed,
    elapsed: state.timer.elapsed,
    subject: state.timer.subject,
    label: state.timer.label
  });
}

function loadTimerFromStorage() {
  const t = LS.get('timer_state');
  if (!t) return;
  state.timer.running = t.running || false;
  state.timer.paused = t.paused || false;
  state.timer.startTs = t.startTs || null;
  state.timer.pausedElapsed = t.pausedElapsed || 0;
  state.timer.subject = t.subject || null;
  state.timer.label = t.label || '';
  // Recalculate elapsed
  if (state.timer.running && !state.timer.paused && state.timer.startTs) {
    state.timer.elapsed = state.timer.pausedElapsed + Math.floor((Date.now()-state.timer.startTs)/1000);
  } else {
    state.timer.elapsed = t.elapsed || 0;
  }
}

function syncTimerToSW() {
  if (navigator.serviceWorker && navigator.serviceWorker.controller) {
    navigator.serviceWorker.controller.postMessage({
      type: 'TIMER_SYNC',
      data: {
        running: state.timer.running,
        paused: state.timer.paused,
        startTs: state.timer.startTs,
        pausedElapsed: state.timer.pausedElapsed
      }
    });
  }
}

function startTimerTick() {
  if (state.timer.interval) clearInterval(state.timer.interval);
  state.timer.interval = setInterval(() => {
    if (!state.timer.running || state.timer.paused) return;
    // Always recalculate from timestamp — immune to tab throttling
    const newElapsed = state.timer.pausedElapsed + Math.floor((Date.now()-state.timer.startTs)/1000);
    state.timer.elapsed = newElapsed;
    const el = document.getElementById('timer-display');
    if (el) el.textContent = fmtTimer(newElapsed);
    document.title = `⏱ ${fmtTimer(newElapsed)} — StudySync`;
    // Save to storage every 10s for recovery
    if (newElapsed % 10 === 0) saveTimerToStorage();
  }, 500); // 500ms for smoother display; actual time from timestamp
}

window.startTimer = () => {
  if (state.timer.running && !state.timer.paused) return;
  const lbl = document.getElementById('session-label');
  if (lbl) state.timer.label = lbl.value;
  const sub = document.getElementById('timer-subject');
  if (sub) state.timer.subject = sub.value || null;

  state.timer.running = true;
  state.timer.paused = false;
  state.timer.pausedElapsed = 0;
  state.timer.startTs = Date.now();
  state.timer.elapsed = 0;
  saveTimerToStorage();
  syncTimerToSW();
  startTimerTick();
  renderMain();
};

window.pauseTimer = () => {
  if (!state.timer.running || state.timer.paused) return;
  const lbl = document.getElementById('session-label');
  if (lbl) state.timer.label = lbl.value;
  // Freeze elapsed
  state.timer.pausedElapsed = getTimerElapsed();
  state.timer.elapsed = state.timer.pausedElapsed;
  state.timer.paused = true;
  state.timer.startTs = null;
  if (state.timer.interval) { clearInterval(state.timer.interval); state.timer.interval = null; }
  document.title = '⏸ StudySync';
  saveTimerToStorage();
  syncTimerToSW();
  renderMain();
};

window.resumeTimer = () => {
  if (!state.timer.running || !state.timer.paused) return;
  state.timer.paused = false;
  state.timer.startTs = Date.now();
  saveTimerToStorage();
  syncTimerToSW();
  startTimerTick();
  renderMain();
};

window.stopTimer = async () => {
  const lbl = document.getElementById('session-label');
  if (lbl) state.timer.label = lbl.value;
  const sub = document.getElementById('timer-subject');
  if (sub && !state.timer.paused) state.timer.subject = sub.value || null;

  const elapsed = getTimerElapsed();
  const label = state.timer.label || 'Study session';
  const subjectId = state.timer.subject;

  if (state.timer.interval) { clearInterval(state.timer.interval); state.timer.interval = null; }
  state.timer.running = false; state.timer.paused = false;
  state.timer.elapsed = 0; state.timer.pausedElapsed = 0;
  state.timer.startTs = null; state.timer.label = ''; state.timer.subject = null;
  document.title = 'StudySync';
  saveTimerToStorage();
  syncTimerToSW();

  if (elapsed >= 60) {
    await logSession(state.user, elapsed/3600, label, subjectId);
    showNotif(`Saved: ${fmtHrs(elapsed/3600)} logged!`);
  } else {
    showNotif('Too short — minimum 1 minute.', 'err');
  }
  renderMain();
};

window.setTimerSubject = (id) => { state.timer.subject = id || null; };

// ─── SUBJECTS ───
window.showAddSubject = () => { state.showAddSubject = true; renderMain(); };
window.hideAddSubject = () => { state.showAddSubject = false; renderMain(); };

window.selectColor = (color, el) => {
  document.getElementById('subject-color').value = color;
  document.querySelectorAll('.color-swatch').forEach(s=>s.classList.remove('selected'));
  el.classList.add('selected');
};
// Make selectColor accessible from inline onclick
window.selectColor = window.selectColor;

window.addSubject = async () => {
  const name = (document.getElementById('subject-name-inp').value||'').trim();
  if (!name) return;
  const color = document.getElementById('subject-color').value || SUBJECT_COLORS[0];
  const u = state.users[state.user];
  if (!u) return;
  const subjects = u.subjects || [];
  const id = 'sub_' + Date.now();
  subjects.push({ id, name, color });
  await fbUpdate(`users/${state.user}`, { subjects });
  u.subjects = subjects;
  state.showAddSubject = false;
  showNotif(`Subject "${name}" added!`);
  renderMain();
};

window.deleteSubject = async (subId) => {
  const u = state.users[state.user]; if (!u) return;
  const subjects = (u.subjects||[]).filter(s=>s.id!==subId);
  await fbUpdate(`users/${state.user}`, { subjects });
  u.subjects = subjects;
  if (state.timer.subject===subId) state.timer.subject=null;
  renderMain();
};

window.selectSubject = (subId) => {
  state.timer.subject = state.timer.subject===subId ? null : subId;
  renderMain();
};

// ─── DAILY GOAL ───
window.saveDailyGoal = async () => {
  const inp = document.getElementById('daily-goal-inp');
  const v = parseFloat(inp?inp.value:0);
  if (!v||v<0.1||v>24) { showNotif('Enter a value between 0.1 and 24','err'); return; }
  await fbUpdate(`users/${state.user}`, { dailyGoal: v });
  if (state.users[state.user]) state.users[state.user].dailyGoal = v;
  showNotif(`Daily goal set to ${fmtHrs(v)}`);
  renderMain();
};

// ─── HISTORY FILTER ───
window.setHistoryFilter = (f) => { state.historyFilter = f; renderMain(); };

// ─── SETTINGS ACTIONS ───
window.setGoal = async g => {
  await fbUpdate(`users/${state.user}`, { goal:g });
  if (state.users[state.user]) state.users[state.user].goal=g;
  renderMain();
};
window.saveCustomGoal = async () => {
  const g=parseInt(document.getElementById('custom-goal').value);
  const el=document.getElementById('goal-msg');
  if (!g||g<1||g>168) { el.style.color='#ef4444'; el.textContent='Enter a valid number (1–168).'; return; }
  await fbUpdate(`users/${state.user}`, { goal:g });
  if (state.users[state.user]) state.users[state.user].goal=g;
  el.style.color='var(--green)'; el.textContent='Goal saved!';
  setTimeout(renderMain, 700);
};
window.setResetDay = async day => {
  await fbUpdate(`users/${state.user}`, { resetDay:day });
  if (state.users[state.user]) state.users[state.user].resetDay=day;
  const el=document.getElementById('reset-msg');
  if (el) { el.style.color='var(--green)'; el.textContent=`Resets every ${DAYS_FULL[day]}.`; }
  setTimeout(renderMain, 700);
};

// ─── ROOMS ACTIONS ───
window.goTab = t => { state.tab=t; state.roomView=null; renderMain(); };
window.logout = () => {
  if (state.timer.running) { pauseTimer(); }
  stopAllListeners();
  state.user=null; state.tab='dashboard'; state.roomView=null;
  LS.set('session',null);
  document.title='StudySync';
  render();
};
window.openRoom = id => { state.roomView=id; renderMain(); };
window.closeRoom = () => { state.roomView=null; renderMain(); };
window.showCreateRoom = () => { state.showCreateRoom=true; renderMain(); };
window.hideCreateRoom = () => { state.showCreateRoom=false; renderMain(); };

window.createRoom = async () => {
  const name=(document.getElementById('room-name-input').value||'').trim(); if (!name) return;
  const id='room_'+Date.now();
  const room={id,name,owner:state.user,members:[],createdAt:Date.now()};
  await fbSet(`rooms/${id}`,room);
  state.rooms[id]=room; state.showCreateRoom=false; state.tab='rooms';
  showNotif('Room created!'); renderMain();
};
window.inviteUser = async roomId => {
  const username=(document.getElementById('invite-user').value||'').trim().toLowerCase();
  const msgEl=document.getElementById('invite-msg');
  const show=(msg,ok)=>{ if(msgEl){msgEl.style.color=ok?'#3ecf8e':'#ef4444';msgEl.textContent=msg;} };
  if (!username) return;
  const room=state.rooms[roomId]; if (!room) return;
  if (!state.users[username]) { show('User not found.',false); return; }
  if (username===state.user) { show("That's you!",false); return; }
  if (room.owner===username||(room.members||[]).includes(username)) { show('Already in this room.',false); return; }
  const members=[...(room.members||[]),username];
  await fbUpdate(`rooms/${roomId}`,{members}); room.members=members;
  show(state.users[username].displayName+' added!',true);
  document.getElementById('invite-user').value='';
  setTimeout(renderMain,600);
};
window.leaveRoom = async roomId => {
  const room=state.rooms[roomId]; if (!room) return;
  const members=(room.members||[]).filter(m=>m!==state.user);
  await fbUpdate(`rooms/${roomId}`,{members}); room.members=members;
  state.roomView=null; showNotif('You left the room.'); renderMain();
};
window.deleteRoom = async roomId => {
  if (!confirm('Delete this room?')) return;
  await fbRemove(`rooms/${roomId}`); delete state.rooms[roomId];
  state.roomView=null; showNotif('Room deleted.'); renderMain();
};

// ─── PERIOD ACTIONS ───
window.setLbMode = m => { state.lbMode = m; renderMain(); };

window.setPeriodMode = async mode => {
  const days = mode === 'week' ? 7 : mode === 'month' ? 30 : (state.users[state.user]||{}).periodDays || 7;
  await fbUpdate(`users/${state.user}`, { periodMode: mode, periodDays: days });
  if (state.users[state.user]) { state.users[state.user].periodMode = mode; state.users[state.user].periodDays = days; }
  showNotif(`Period set to ${mode}`); renderMain();
};

window.setPeriodCustom = async days => {
  await fbUpdate(`users/${state.user}`, { periodMode: 'custom', periodDays: days });
  if (state.users[state.user]) { state.users[state.user].periodMode = 'custom'; state.users[state.user].periodDays = days; }
  showNotif(`Period set to ${days} days`); renderMain();
};

window.saveCustomPeriod = async () => {
  const inp = document.getElementById('custom-period-days');
  const d = parseInt(inp ? inp.value : 0);
  if (!d || d < 1 || d > 365) { showNotif('Enter 1–365 days', 'err'); return; }
  await window.setPeriodCustom(d);
};

// ─── NOTIF ───
function showNotif(msg, type='ok') {
  document.querySelectorAll('.notif').forEach(n=>n.remove());
  const n=document.createElement('div');
  n.className='notif'+(type==='err'?' err':''); n.textContent=msg;
  document.body.appendChild(n); setTimeout(()=>n.remove(),3200);
}

// ─── BIND EVENTS ───
function bindEvents() {
  const lbl=document.getElementById('session-label');
  if (lbl) lbl.oninput=e=>{state.timer.label=e.target.value;};
  const inv=document.getElementById('invite-user');
  if (inv) inv.addEventListener('keydown',e=>{if(e.key==='Enter')window.inviteUser(state.roomView);});
  const roomInp=document.getElementById('room-name-input');
  if (roomInp) { roomInp.addEventListener('keydown',e=>{if(e.key==='Enter')window.createRoom();}); roomInp.focus(); }
  const subInp=document.getElementById('subject-name-inp');
  if (subInp) { subInp.addEventListener('keydown',e=>{if(e.key==='Enter')window.addSubject();}); subInp.focus(); }
  // If timer running, restart tick (page reload / re-render)
  if (state.timer.running && !state.timer.paused && !state.timer.interval) {
    startTimerTick();
  }
}

// ─── AUTO-SAVE TIMER ON CLOSE ───
window.addEventListener('beforeunload', () => {
  if (state.timer.running) {
    saveTimerToStorage();
    syncTimerToSW();
  }
});

// ─── VISIBILITY: recalc elapsed when tab comes back ───
document.addEventListener('visibilitychange', () => {
  if (!document.hidden && state.timer.running && !state.timer.paused) {
    // Recalculate from startTs — no drift from background throttling
    state.timer.elapsed = getTimerElapsed();
    const el=document.getElementById('timer-display');
    if (el) el.textContent = fmtTimer(state.timer.elapsed);
    // Restart tick
    if (!state.timer.interval) startTimerTick();
  }
});

// ─── BOOT ───
async function boot() {
  const saved = LS.get('session');
  if (saved) {
    state.user = saved;
    loadTimerFromStorage(); // restore timer before render
    startSync();
    await new Promise(r=>setTimeout(r, firebaseReady?1200:0));
  }
  document.getElementById('loading-overlay').remove();
  render();
  // Restart tick if timer was running
  if (state.user && state.timer.running && !state.timer.paused) {
    startTimerTick();
  }
}

boot();
</script>
</body>
